id: API-SRC-001-005
ssot_type: API
title: Governed Skill Adoption and Readiness Contract
status: active
version: v1
schema_version: 0.1.0
parent_id: FEAT-SRC-001-005
derived_from_ids:
  - id: FEAT-SRC-001-005
    version: v2
    required: true
  - id: TECH-SRC-001-005
    version: v4
    required: true
source_refs:
  - SRC-001
  - EPIC-SRC-001-001
  - ARCH-SRC-001-001
  - TECH-SRC-001-005
  - ADR-008
  - ADR-009
owner: contract-architect
tags:
  - api
  - rollout
  - onboarding
  - readiness
  - pilot-e2e
properties:
  src_root_id: src-root-src-001
  runtime_carrier: cli-first file-runtime
  protocol_type: cli+file-runtime
  delivery_record_ref_policy: optional-post-release
  provider_scope:
    - cli
    - src/backend
    - rollout/e2e helpers
  consumer_scope:
    - onboarding validator
    - pilot e2e runner
    - readiness reviewer
  umbrella_contract: false
  contract_role: rollout-readiness
boundary_statement:
  architecture: 定义系统总装关系与 adoption/e2e 在主链中的位置。
  tech: 定义 onboarding、migration、pilot 验证的内部实现策略。
  api: 定义 rollout/readiness 运行单元之间的契约，不回写 runtime baseline 核心命令面。
  precedence_rule: core runtime 命令面以 API-SRC-001-001 为准；本文件只覆盖 adoption/readiness 契约。
summary: >
  本 API 对象冻结 governed skill onboarding、migration wave、pilot chain 验证与
  readiness 汇总的跨单元契约，不重复定义 artifact/registry/audit/gate runtime 主接口。
purpose: >
  为 FEAT-SRC-001-005 的 adoption/E2E 开发提供独立 contract，避免把 rollout/readiness
  继续塞进 runtime baseline，导致 API 膨胀。
invocation_model:
  kind: structured-file-request
  rule: >
    rollout/readiness 命令同样采用 `ll rollout <action> --request <file> --response-out <file>`
    的调用模式；关键业务字段进入 request 文件，不依赖自由 positional args。
  path_rules:
    - 成功响应的 data.canonical_path 必须回写主结果对象的规范路径。
    - guarded gate 分支结果只能通过显式 guarded 字段传入，不得隐式推断。
standard_envelope:
  request_envelope:
    required_fields:
      - api_version
      - command
      - request_id
      - workspace_root
      - actor_ref
      - trace
      - payload
  response_envelope:
    required_fields:
      - api_version
      - command
      - request_id
      - result_status
      - status_code
      - exit_code
      - message
      - data
      - diagnostics
      - evidence_refs
    success_data_required_fields:
      - canonical_path
    status_semantics:
      OK: success
      INVALID_REQUEST: fatal_failure
      PRECONDITION_FAILED: retryable_failure
      PROVISIONAL_SLICE_DISABLED: denied
      INTERNAL_ERROR: fatal_failure
interfaces:
  - interface_id: rollout_and_e2e
    provider: ll rollout
    consumers:
      - onboarding validator
      - pilot e2e runner
      - readiness reviewer
    purpose: governed skill onboarding、pilot chain 验证与 readiness 汇总。
    allowed_actions:
      - assess-skill
      - validate-pilot
      - summarize-readiness
    payload_contract:
      required_fields:
        - integration_matrix_ref
        - migration_wave_ref
        - pilot_chain_ref
      optional_fields:
        - guarded_gate_result_ref
        - pilot_evidence_expectation
    response_contract:
      data_fields:
        - canonical_path
        - onboarding_assessment_ref
        - pilot_evidence_ref
        - readiness_summary_ref
        - readiness_label
    common_errors:
      - INVALID_REQUEST
      - PRECONDITION_FAILED
      - PROVISIONAL_SLICE_DISABLED
      - INTERNAL_ERROR
error_catalog:
  INVALID_REQUEST:
    meaning: request 文件结构错误或缺少必填 rollout 输入。
    caller_action: 修复请求后重试。
  PRECONDITION_FAILED:
    meaning: pilot 链、迁移波次或 integration matrix 未准备完成。
    caller_action: 补齐前置条件后重试。
  PROVISIONAL_SLICE_DISABLED:
    meaning: guarded gate 分支未被允许纳入本轮验证。
    caller_action: 输出 guarded-only 或 core-only readiness 结论。
  INTERNAL_ERROR:
    meaning: 非预期内部错误。
    caller_action: 记录 evidence，阻断 readiness 汇总并进入诊断。
examples:
  readiness_summary_request:
    cli: ll rollout summarize-readiness --request contracts/input/rollout-readiness.request.json --response-out artifacts/active/run-001/rollout/readiness.response.json
    request:
      api_version: v1
      command: rollout.summarize-readiness
      request_id: req-rollout-readiness-001
      workspace_root: E:/ai/LEE-Lite-skill-first
      actor_ref: readiness/reviewer
      trace:
        feat_ref: FEAT-SRC-001-005
        run_ref: RUN-001
      payload:
        integration_matrix_ref: ssot/impl/IMPL-SRC-001-005-001__governed-skill-integration-matrix-and-onboarding-scope-definition.md
        migration_wave_ref: ssot/impl/IMPL-SRC-001-005-002__migration-wave-cutover-and-fallback-rule-definition.md
        pilot_chain_ref: ssot/impl/IMPL-SRC-001-005-003__pilot-chain-selection-and-cross-skill-e2e-evidence-contract.md
    response:
      api_version: v1
      command: rollout.summarize-readiness
      request_id: req-rollout-readiness-001
      result_status: success
      status_code: OK
      exit_code: 0
      message: rollout readiness summarized
      data:
        canonical_path: artifacts/active/run-001/rollout/readiness-summary.json
        readiness_summary_ref: artifacts/active/run-001/rollout/readiness-summary.json
        readiness_label: core-ready
      diagnostics: []
      evidence_refs:
        - artifacts/active/run-001/rollout/readiness-summary.json
compatibility_notes:
  - 本文件不重定义 API-SRC-001-001 中的 artifact/registry/audit/gate 主命令面。
  - 若未来 rollout/readiness 再细拆，可继续按 FEAT 或 pilot slice 派生新的 API 对象。
