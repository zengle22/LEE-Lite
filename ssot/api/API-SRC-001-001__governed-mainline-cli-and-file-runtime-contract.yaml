properties:
  src_root_id: src-root-src-001
  runtime_carrier: cli-first file-runtime
  protocol_type: cli+file-runtime
  delivery_record_ref_policy: optional-post-release
  provider_scope:
    - cli
    - src/backend
    - loop/watcher consumers
  consumer_scope:
    - governed skill
    - execution loop
    - human gate loop
    - auditor
  umbrella_contract: true
  contract_role: runtime-baseline
boundary_statement:
  architecture: 定义系统边界、职责分配、组件拓扑与默认实现承载形态。
  tech: 定义内部实现约束、数据落盘、容错、集成策略与模块拆分。
  api: 定义跨模块、跨角色、跨运行单元的 CLI/file-runtime 契约，不回写内部实现决策。
  precedence_rule: 若 API 与 TECH 冲突，跨模块 contract 以 API 为准；若 API 与 ARCH 冲突，系统边界以 ARCH 与 ADR 为准。
summary: >
  本 API 对象冻结 SRC-001 / EPIC-SRC-001-001 主链的 runtime contract，回答模块之间如何通过
  CLI 与文件对象对接、skill 到底怎么调用、哪些命令可由 skill 直接调用、哪些命令
  只能由 loop/gate 控制层调用。
purpose: >
  为 cli/ 与 src/backend/ 的正式开发提供稳定 command surface、对象事件、错误语义、
  兼容性规则与示例，不要求先引入 HTTP service 或前后端平台。
invocation_model:
  kind: structured-file-request
  rule: >
    所有正式 CLI 命令采用 `ll <group> <action> --request <file> --response-out <file>`
    作为主调用模式；必要时可附加 `--evidence-out <file>`、`--workspace-root <path>`、
    `--strict` 等参数，但不得把业务关键字段下沉为无法版本化的自由 positional args。
  path_rules:
    - request 和 response_out 可以是绝对路径或 workspace-root 相对路径。
    - 成功响应的 data.canonical_path 必须回写主结果对象的规范路径，供下游稳定引用。
    - 关键业务字段进入 request 文件，不依赖环境变量隐式传递。
tooling_cli_boundary:
  callable_by_skill: true
  command_families:
    - artifact
    - validate
    - evidence
    - gate-package
  rule: >
    governed skill 只能调用 tooling CLI，不得通过 control CLI 自行触发下一轮执行、
    最终 gate decision、formal materialization 或 run closure。
control_cli_boundary:
  callable_by_skill: false
  callable_by:
    - execution loop
    - human gate loop
    - watcher
  command_families:
    - loop
    - gate-claim
    - gate-decision
    - gate-dispatch
    - run-close
  rule: >
    control CLI 负责 gate pending claim、decision capture、dispatch 与 closure；业务 skill
    不得直接调用这些命令以绕过 gate 分权。
standard_envelope:
  request_envelope:
    required_fields:
      - api_version
      - command
      - request_id
      - workspace_root
      - actor_ref
      - trace
      - payload
    field_semantics:
      api_version: 命令契约版本，当前固定为 v1。
      command: 逻辑命令名，例如 artifact.write 或 gate.claim-next。
      request_id: 本次调用的稳定请求标识，用于 evidence 与日志关联。
      workspace_root: 本次调用绑定的工作区根目录。
      actor_ref: 调用方标识，例如 governed-skill/raw-to-src 或 loop/external-gate。
      trace: source_refs、run_ref、job_ref、feat_ref 等追溯上下文。
      payload: 命令特有的业务入参。
  response_envelope:
    required_fields:
      - api_version
      - command
      - request_id
      - result_status
      - status_code
      - exit_code
      - message
      - data
      - diagnostics
      - evidence_refs
    success_data_required_fields:
      - canonical_path
    result_status_values:
      success: 命令完成且输出可被下游正式消费。
      denied: 因 policy、eligibility 或 gate 条件被拒绝。
      retryable_failure: 失败但允许修补或重试。
      fatal_failure: 失败且当前调用不应自动继续。
    status_code_values:
      OK: 正常成功。
      INVALID_REQUEST: 入参结构不合法或缺少必填字段。
      POLICY_DENIED: 路径、mode 或 placement 被 Path Policy 拒绝。
      REGISTRY_MISS: formal reference 或 registry 记录缺失。
      ELIGIBILITY_DENIED: 读取或消费资格不满足。
      PRECONDITION_FAILED: 先决条件不满足，例如缺少 staging provenance。
      PROVISIONAL_SLICE_DISABLED: guarded slice 未被允许启用。
      INVARIANT_VIOLATION: 触发主链强约束，例如 no-fallback violated。
      INTERNAL_ERROR: 非预期内部错误。
    status_semantics:
      OK: success
      INVALID_REQUEST: fatal_failure
      POLICY_DENIED: denied
      REGISTRY_MISS: fatal_failure
      ELIGIBILITY_DENIED: denied
      PRECONDITION_FAILED: retryable_failure
      PROVISIONAL_SLICE_DISABLED: denied
      INVARIANT_VIOLATION: fatal_failure
      INTERNAL_ERROR: fatal_failure
    exit_code_map:
      0: success
      2: INVALID_REQUEST
      3: POLICY_DENIED or ELIGIBILITY_DENIED
      4: PRECONDITION_FAILED or PROVISIONAL_SLICE_DISABLED
      5: INVARIANT_VIOLATION
      10: INTERNAL_ERROR
compatibility:
  major_version_policy:
    - 破坏性字段变更、命令重命名、必填字段新增，只能通过新 major 版本进行。
    - v1 命令名和主 envelope 字段在 major 内保持稳定。
  minor_version_policy:
    - 允许新增可选字段、可选 diagnostics、附加 evidence_refs。
    - 允许新增 command family，但不得改变已有 family 的既有语义。
  caller_requirements:
    - 调用方必须显式声明 api_version。
    - 调用方必须容忍未知可选字段。
    - 调用方必须对未知关键枚举值 fail-closed，而不是 silent ignore。
  extension_rule:
    - 实验性附加字段必须放入 extensions 命名空间。
    - 不得把正式语义长期放在 extensions 中不回收。
version_strategy:
  current: v1
  default_mode: stable
  guarded_slice_rule: >
    任何 guarded/provisional 命令或字段都必须显式标记 guarded_only: true，
    并在 response 中返回 enablement_scope，禁止被误读为 default-active。
caller_assumptions:
  - 调用方运行在本地文件系统语境中，而不是远程 RPC 语境中。
  - 调用方可以读写 request/response/evidence 文件，但不能越权改写 formal object。
  - governed skill 只负责 candidate/evidence/proposal，不负责最终 decision/materialization。
  - formal ssot object、authoritative handoff submission、dispatch result 与 run closure 只能由 gate/control 层物化。
  - human gate 可通过文件对象与 loop 消费链协作，不要求必须先有 Web UI。
interfaces:
  - interface_id: artifact_operations
    provider: ll artifact
    consumers:
      - governed skill
      - gate materialization control
    purpose: 统一 managed artifact 的 read/write/commit/promote/append-run-log。
    allowed_actions:
      - read
      - write
      - commit
      - promote
      - append-run-log
    payload_contract:
      required_fields:
        - operation
        - artifact_ref
        - workspace_path
        - requested_mode
      optional_fields:
        - content_ref
        - staging_ref
        - metadata
      field_semantics:
        artifact_ref: 逻辑 artifact 标识或 formal reference。
        workspace_path: 待写入或读取的目标路径。
        requested_mode: create/replace/patch/append/promote/read。
        content_ref: 待落盘内容的文件引用。
        staging_ref: staging 产物引用；promote 时必填。
    response_contract:
      data_fields:
        - canonical_path
        - policy_verdict
        - receipt_ref
        - registry_record_ref
        - managed_artifact_ref
      notes:
        - write/commit/promote 成功时必须返回 receipt_ref。
        - read 成功时必须返回来源 registry_record_ref 或 formal reference resolution 结果。
    common_errors:
      - POLICY_DENIED
      - REGISTRY_MISS
      - ELIGIBILITY_DENIED
      - PRECONDITION_FAILED
      - INVARIANT_VIOLATION
  - interface_id: registry_and_admission
    provider: ll registry
    consumers:
      - ll artifact
      - auditor
      - downstream governed skill
    purpose: formal reference 解析、read eligibility 判定、lineage admission 校验。
    allowed_actions:
      - resolve-formal-ref
      - verify-eligibility
      - bind-record
    payload_contract:
      required_fields:
        - artifact_ref
        - admission_context
      optional_fields:
        - producer_run_ref
        - lineage_expectation
    response_contract:
      data_fields:
        - canonical_path
        - registry_record_ref
        - resolved_artifact_ref
        - eligibility_result
        - lineage_summary
    common_errors:
      - REGISTRY_MISS
      - ELIGIBILITY_DENIED
      - INVALID_REQUEST
  - interface_id: audit_and_findings
    provider: ll audit
    consumers:
      - execution loop
      - repair flow
      - external gate
    purpose: 旁路或 attempted unmanaged consumption 识别、finding bundle 输出。
    allowed_actions:
      - scan-workspace
      - emit-finding-bundle
    payload_contract:
      required_fields:
        - workspace_diff_ref
        - gateway_receipt_refs
        - registry_refs
        - policy_verdict_refs
      optional_fields:
        - run_log_ref
    response_contract:
      data_fields:
        - canonical_path
        - finding_bundle_ref
        - severity_summary
        - minimal_patch_scope
      notes:
        - audit 不替代主防线读写阻断。
        - 未注册消费在 audit 中表达为 bypass 或 attempted-consumption finding。
    common_errors:
      - INVALID_REQUEST
      - INVARIANT_VIOLATION
      - INTERNAL_ERROR
  - interface_id: gate_package_operations
    provider: ll gate
    permission_scope: tooling-cli
    callable_by:
      - governed skill
    consumers:
      - governed skill
      - packaging/orchestration
    purpose: gate-ready package 的创建与静态校验。
    allowed_actions:
      - create
      - verify
    payload_contract:
      required_fields:
        - candidate_ref
        - acceptance_ref
        - evidence_bundle_ref
      optional_fields:
        - budget_ref
        - audit_hint_refs
    response_contract:
      data_fields:
        - canonical_path
        - gate_ready_package_ref
        - completeness_result
        - validation_summary
    common_errors:
      - INVALID_REQUEST
      - PRECONDITION_FAILED
  - interface_id: gate_pending_review_and_dispatch
    provider: ll gate
    permission_scope: control-cli
    callable_by:
      - human gate loop
      - watcher
    consumers:
      - human gate loop
    purpose: gate pending queue 的 claim、human decision capture、dispatch 与 run closure。
    allowed_actions:
      - show-pending
      - claim-next
      - capture-decision
      - dispatch
      - close-run
    payload_contract:
      required_fields:
        - gate_pending_ref | claim_ref | gate_decision_ref
      optional_fields:
        - gate_ready_package_ref
        - audit_finding_refs
        - human_decision_ref
        - guarded_enablement_ref
        - decision_target
        - decision_basis_refs
        - dispatch_target
    response_contract:
      data_fields:
        - canonical_path
        - brief_record_ref
        - pending_human_decision_ref
        - claim_ref
        - gate_decision_ref
        - decision
        - decision_target
        - decision_basis_refs
        - dispatch_target
        - authoritative_handoff_ref
        - ready_job_ref
        - dispatch_result_ref
        - run_closure_ref
        - enablement_scope
      notes:
        - claim-next 必须锁定唯一 pending 项，并生成 gate-brief-record 与可回交流水。
        - capture-decision 必须生成唯一 authoritative gate-decision。
        - dispatch 必须按 decision 语义分流，不允许把 human decision action 当成 runtime state。
        - guarded slice 必须明确返回 enablement_scope=guarded-only。
    common_errors:
      - INVALID_REQUEST
      - PRECONDITION_FAILED
      - PROVISIONAL_SLICE_DISABLED
      - INVARIANT_VIOLATION
object_events:
  - object_type: gate_ready_package
    producer: governed skill + packaging/orchestration
    consumer: ll gate claim-next
    required_fields:
      - candidate_ref
      - acceptance_ref
      - evidence_bundle_ref
      - budget_ref
      - trace
  - object_type: audit_finding_bundle
    producer: ll audit emit-finding-bundle
    consumer:
