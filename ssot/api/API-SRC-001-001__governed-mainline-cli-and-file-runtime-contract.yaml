      - dispatch_target
      - dispatch_status
      - trace
  - object_type: run_closure
    producer: ll gate close-run
    consumer:
      - reporting
      - orchestration
    required_fields:
      - run_ref
      - final_status
      - gate_decision_ref
      - trace
error_catalog:
  INVALID_REQUEST:
    meaning: request 文件结构错误、缺少必填字段、字段类型不匹配。
    caller_action: 修复 request 后重试；不得继续推进主链。
  POLICY_DENIED:
    meaning: Path Policy 或 mode 决策拒绝本次操作。
    caller_action: 进入修补或调整路径/mode；不得 fallback 直写。
  REGISTRY_MISS:
    meaning: formal reference 无法解析，或 registry 中不存在正式记录。
    caller_action: fail-closed；不得用目录扫描替代。
  ELIGIBILITY_DENIED:
    meaning: 对象存在，但当前读取/消费上下文不具备正式资格。
    caller_action: fail-closed；按 admission 规则修复。
  PRECONDITION_FAILED:
    meaning: 缺少 staging provenance、gate 前置条件、必需 evidence 或 target constraints。
    caller_action: 补齐前置条件后重试。
  PROVISIONAL_SLICE_DISABLED:
    meaning: guarded/provisional slice 未获允许启用。
    caller_action: 输出 guarded-only 结论，禁止默认提升为 active。
  INVARIANT_VIOLATION:
    meaning: 触发主链强约束，例如 no-fallback、decision uniqueness、formal layering。
    caller_action: 视为 blocker，进入修补或人工升级处理。
  INTERNAL_ERROR:
    meaning: 非预期内部错误。
    caller_action: 记录 evidence，阻断继续推进，并进入诊断。
examples:
  artifact_write_request:
    cli: ll artifact write --request contracts/input/artifact-write.request.json --response-out artifacts/active/run-001/receipts/artifact-write.response.json
    request:
      api_version: v1
      command: artifact.write
      request_id: req-artifact-write-001
      workspace_root: E:/ai/LEE-Lite-skill-first
      actor_ref: governed-skill/raw-to-src
      trace:
        run_ref: RUN-001
        feat_ref: FEAT-SRC-001-004
      payload:
        operation: write
        artifact_ref: candidate.src
        workspace_path: artifacts/active/run-001/src-candidate.md
        requested_mode: create
        content_ref: .workflow/runs/RUN-001/generated/src-candidate.md
    response:
      api_version: v1
      command: artifact.write
      request_id: req-artifact-write-001
      result_status: success
      status_code: OK
      exit_code: 0
      message: managed artifact write completed
      data:
        canonical_path: artifacts/active/run-001/src-candidate.md
        policy_verdict: allow
        receipt_ref: artifacts/active/run-001/receipts/write-001.json
        registry_record_ref: artifacts/registry/run-001-candidate-src.json
        managed_artifact_ref: artifacts/active/run-001/src-candidate.md
      diagnostics: []
      evidence_refs:
        - artifacts/active/run-001/receipts/write-001.json
  gate_claim_next_request:
    cli: ll gate claim-next --request contracts/input/gate-claim-next.request.json --response-out artifacts/active/run-001/gate/gate-claim-next.response.json
    request:
      api_version: v1
      command: gate.claim-next
      request_id: req-gate-claim-next-001
      workspace_root: E:/ai/LEE-Lite-skill-first
      actor_ref: loop/human-gate
      trace:
        run_ref: RUN-001
        feat_ref: FEAT-SRC-001-002
      payload:
        gate_pending_ref: artifacts/active/gates/pending/gate-pending-001.json
    response:
      api_version: v1
      command: gate.claim-next
      request_id: req-gate-claim-next-001
      result_status: success
      status_code: OK
      exit_code: 0
      message: pending gate item claimed
      data:
        canonical_path: artifacts/active/gates/claims/gate-claim-001.json
        brief_record_ref: artifacts/active/gates/briefs/gate-brief-record.json
        pending_human_decision_ref: artifacts/active/gates/pending/gate-pending-human-decision.json
        claim_ref: artifacts/active/gates/claims/gate-claim-001.json
        authoritative_handoff_ref: artifacts/active/gates/handoffs/handoff-001.json
        decision_target: candidate.impl
        decision_basis_refs:
          - artifacts/active/gates/briefs/gate-brief-record.json
          - artifacts/active/audit/finding-bundle.json
        enablement_scope: guarded-only
      diagnostics:
        - pending item is now owned by the current human gate session
      evidence_refs:
        - artifacts/active/gates/briefs/gate-brief-record.json
        - artifacts/active/gates/pending/gate-pending-human-decision.json
        - artifacts/active/gates/claims/gate-claim-001.json
  gate_capture_decision_request:
    cli: ll gate capture-decision --request contracts/input/gate-capture-decision.request.json --response-out artifacts/active/run-001/gate/gate-capture-decision.response.json
    request:
      api_version: v1
      command: gate.capture-decision
      request_id: req-gate-capture-decision-001
      workspace_root: E:/ai/LEE-Lite-skill-first
      actor_ref: loop/human-gate
      trace:
        run_ref: RUN-001
        feat_ref: FEAT-SRC-001-002
      payload:
        claim_ref: artifacts/active/gates/claims/gate-claim-001.json
        decision: approve
        decision_target: candidate.impl
        dispatch_target: formal_publication_trigger
        decision_basis_refs:
          - artifacts/active/gates/briefs/gate-brief-record.json
          - artifacts/active/audit/finding-bundle.json
    response:
      api_version: v1
      command: gate.capture-decision
      request_id: req-gate-capture-decision-001
      result_status: success
      status_code: OK
      exit_code: 0
      message: authoritative gate decision captured
      data:
        canonical_path: artifacts/active/gates/decisions/gate-decision.json
        claim_ref: artifacts/active/gates/claims/gate-claim-001.json
        gate_decision_ref: artifacts/active/gates/decisions/gate-decision.json
        decision: approve
        decision_target: candidate.impl
        decision_basis_refs:
          - artifacts/active/gates/briefs/gate-brief-record.json
          - artifacts/active/audit/finding-bundle.json
        dispatch_target: formal_publication_trigger
        run_closure_ref: ""
        enablement_scope: guarded-only
      diagnostics: []
      evidence_refs:
        - artifacts/active/gates/decisions/gate-decision.json
  gate_dispatch_request:
    cli: ll gate dispatch --request contracts/input/gate-dispatch.request.json --response-out artifacts/active/run-001/gate/gate-dispatch.response.json
    request:
      api_version: v1
      command: gate.dispatch
      request_id: req-gate-dispatch-001
      workspace_root: E:/ai/LEE-Lite-skill-first
      actor_ref: loop/human-gate
      trace:
        run_ref: RUN-001
        feat_ref: FEAT-SRC-001-002
      payload:
        gate_decision_ref: artifacts/active/gates/decisions/gate-decision.json
    response:
      api_version: v1
      command: gate.dispatch
      request_id: req-gate-dispatch-001
      result_status: success
      status_code: OK
      exit_code: 0
      message: gate decision dispatched
      data:
        canonical_path: artifacts/active/gates/dispatch/dispatch-result.json
        gate_decision_ref: artifacts/active/gates/decisions/gate-decision.json
        dispatch_result_ref: artifacts/active/gates/dispatch/dispatch-result.json
        dispatch_status: dispatched
        authoritative_handoff_ref: artifacts/active/gates/handoffs/handoff-001.json
        ready_job_ref: artifacts/jobs/ready/job-001.json
        run_closure_ref: artifacts/active/gates/closures/run-001.json
        enablement_scope: core
      diagnostics: []
      evidence_refs:
        - artifacts/active/gates/dispatch/dispatch-result.json
