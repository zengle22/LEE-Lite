    consumer:
      - ll gate dispatch
      - ll gate close-run
    required_fields:
      - decision_type
      - decision_target
      - decision_basis_refs
      - dispatch_target
      - target_matrix
      - rationale
      - trace
  - object_type: gate_brief_record
    producer: ll gate claim-next
    consumer:
      - human gate loop
      - ll gate dispatch
    required_fields:
      - handoff_ref
      - proposal_ref
      - gate_type
      - priority
      - decision_target
      - human_projection
      - trace
  - object_type: gate_pending_human_decision
    producer: ll gate claim-next
    consumer:
      - human gate loop
      - ll gate dispatch
    required_fields:
      - brief_record_ref
      - claim_owner
      - claim_status
      - decision_round
      - state
      - trace
  - object_type: authoritative_handoff_submission
    producer: ll gate submit-handoff
    consumer:
      - human gate loop
      - ll gate claim-next
    required_fields:
      - handoff_type
      - input_refs
      - gate_pending_ref
      - trace
  - object_type: ready_execution_job
    producer: ll gate dispatch
    consumer:
      - execution loop
    required_fields:
      - job_type
      - payload_ref
      - gate_decision_ref
      - trace
  - object_type: dispatch_result
    producer: ll gate dispatch
    consumer:
