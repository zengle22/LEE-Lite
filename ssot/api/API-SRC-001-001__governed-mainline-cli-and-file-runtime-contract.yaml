id: API-SRC-001-001
ssot_type: API
title: Governed Mainline CLI and File Runtime Contract
status: active
version: v2
schema_version: 0.1.0
parent_id: ARCH-SRC-001-001
derived_from_ids:
  - id: ARCH-SRC-001-001
    version: v2
    required: true
  - id: EPIC-SRC-001-001
    version: v2
    required: true
  - id: FEAT-SRC-001-001
    version: v2
    required: true
  - id: FEAT-SRC-001-002
    version: v2
    required: true
  - id: FEAT-SRC-001-003
    version: v2
    required: true
  - id: FEAT-SRC-001-004
    version: v2
    required: true
source_refs:
  - SRC-001
  - EPIC-SRC-001-001
  - ARCH-SRC-001-001
  - ARCH-SRC-001-002
  - TECH-SRC-001-001
  - TECH-SRC-001-002
  - TECH-SRC-001-003
  - TECH-SRC-001-004
  - ADR-001
  - ADR-003
  - ADR-004
