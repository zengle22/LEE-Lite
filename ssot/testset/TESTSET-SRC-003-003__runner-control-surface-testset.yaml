test_set_id: TS-SRC-003-003
feat_ref: FEAT-SRC-003-003
epic_ref: EPIC-SRC-003-001
src_ref: SRC-003
title: Runner 控制面流 Test Set
description: 冻结 runner CLI control surface、ownership guard 与 control-plane boundary 的测试对象边界。
status: frozen
frozen_at: '2026-03-26T00:00:00+08:00'
candidate_package_ref: artifacts/feat-to-testset/adr018-runner-control-testset-r1
coverage_scope:
  - 定义 CLI control surface：ll loop run-execution、ll job claim、ll job run、ll job complete、ll job fail。
  - 定义各控制命令与 runner lifecycle / job lifecycle 的映射关系。
  - 定义控制面输出的结构化状态，而不是把操作结果留成隐式终端副作用。
recommended_coverage_scope_name:
  - execution runner control-surface feature
feature_owned_code_paths:
  - cli/lib/runner_control.py
  - cli/lib/job_state.py
  - cli/commands/job/command.py
risk_focus:
  - 要求 every test unit 都能回链到 FEAT acceptance、governing ADR 与 expected downstream evidence。
  - control verbs 分散且无统一治理
  - control plane 越权改写业务结果
preconditions:
  - selected FEAT 及其上游 source refs 可被稳定解析。
  - runner control surface 已暴露 lifecycle commands。
  - runner context 与 ownership record 可被解析。
environment_assumptions:
  - 需要可解析 selected FEAT 所依赖的集成环境与上游 artifact lineage。
  - 需要能读取并追踪 FEAT、EPIC、SRC 与 governing ADR 引用。
  - runner lifecycle commands 与 ownership guard 必须在同一条 authoritative control plane 上可观测。
  - control action record 不得与 dispatch / outcome 结果混层。
required_environment_inputs:
  environment:
    - 可运行 selected FEAT 的集成环境
    - 可解析 source_refs 的受治理 workspace 上下文
  data:
    - runner control action fixture
    - job ownership fixture
    - invalid transition failure samples
  services:
    - runner command router
    - ownership guard
    - control evidence writer
  access:
    - 调用 ll job claim/run/complete/fail 与读取 control action record 的权限
    - job ownership state credential 或等价账号材料
  ui_or_integration_context:
    - runner CLI control surface context
test_layers:
  - integration
test_units:
  - unit_ref: TS-SRC-003-003-U01
    title: runner control surface 统一暴露 claim / run / complete / fail
    priority: P1
    trigger_action: control actions are listed
    pass_conditions:
      - claim / run / complete / fail 具有统一入口与命名。
      - 控制动作产生 authoritative control action record。
  - unit_ref: TS-SRC-003-003-U02
    title: runner control action 必须遵守 ownership 与状态机约束
    priority: P1
    trigger_action: the action completes
    pass_conditions:
      - 仅 job owner 能执行受限控制动作。
      - 非法状态跃迁必须 fail closed。
  - unit_ref: TS-SRC-003-003-U03
    title: control plane 不越权改写 dispatch 或 outcome 边界
    priority: P1
    trigger_action: FEAT-SRC-003-003 is reviewed for product completeness
    pass_conditions:
      - control surface 只改变 runner lifecycle，不直接改写 dispatch 结果或 outcome 业务语义。
      - control plane 与业务结果分层保持清晰。
coverage_exclusions:
  - 不覆盖 selected FEAT 之外的相邻 FEAT 语义。
  - 不把本 TESTSET 扩展为 TASK、TECH 或 runner-level 实现细节。
pass_criteria:
  - 每条 acceptance check 都有至少一个可执行测试单元映射。
  - runner CLI control surface 必须统一暴露 claim/run/complete/fail 等控制语义。
  - control plane 不得越权改写 dispatch 或 outcome 业务边界。
evidence_required:
  - runner control action record
  - job ownership evidence
  - control-plane state transition evidence
acceptance_traceability:
  - acceptance_ref: runner-control-surface-AC-01
    acceptance_scenario: CLI controls are explicit
    coverage_status: covered
  - acceptance_ref: runner-control-surface-AC-02
    acceptance_scenario: Control results are structured
    coverage_status: covered
  - acceptance_ref: FEAT-SRC-003-003-AC-01
    acceptance_scenario: Runner control verbs are unified
    coverage_status: covered
source_refs:
