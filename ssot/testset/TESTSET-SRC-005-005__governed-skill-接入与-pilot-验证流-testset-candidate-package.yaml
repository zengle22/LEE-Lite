  - pilot evidence package
  - wave state fixture
  - fallback / rollback 失败样本
  services:
  - selected FEAT 所依赖的集成服务或协作 consumer
  - 跨 skill pilot 链路涉及的 producer / consumer / gate consumer
  - pilot chain verifier
  - wave state writer
  - audit evidence aggregator
  access:
  - 读取 FEAT candidate / freeze lineage 所需权限
  - 执行 QA evidence 采集与落盘所需权限
  - pilot verifier credential / audit token / rollout service account
  - 读取与写回 wave state、cutover_guard_ref、fallback receipt 的权限
  feature_flags:
  - selected FEAT 涉及的 gated rollout、cutover 或 guarded branch 开关
  - pilot enablement / guarded rollout / compat mode switch
  ui_or_integration_context:
  - 驱动 FEAT acceptance checks 的 CLI 命令、接口调用或 integration context
  - producer -> gate -> formal -> consumer -> audit pilot chain context
