coverage_exclusions:
- Do not redefine ADR-005 prerequisite foundations or foundation FEAT contracts that
  already own IO/gate consumption boundaries.
- Do not require one-shot migration of every governed skill or exhaustive coverage
  of every producer/consumer combination.
pass_criteria:
- 每条 acceptance check 都有至少一个可执行测试单元映射。
- TESTSET 不越界覆盖相邻 FEAT 或新需求。
- candidate package 在外置 approval 前保持 machine-readable traceability 与 gate subject
  identity。
- 高风险或 adoption/E2E 路径需要明确的环境、数据与 pilot execution 前提。
- 至少一条 producer -> gate -> formal -> consumer -> audit 真实 pilot 主链被验证。
- pilot evidence 缺失时 rollout 必须 fail closed，fallback / wave state 必须可追溯。
evidence_required:
- analysis 与 strategy 形成过程的 execution evidence
- supervisor 对 TESTSET 与 traceability 的 review evidence
- candidate package 的 machine-readable gate subject records
- 若进入 e2e 层，需补充 pilot 链路或 UI/integration context 的执行前提证据
- pilot evidence package
- wave state / cutover_guard_ref evidence
- fallback / rollback evidence
