coverage_scope:
- 定义哪些 governed skill 先接入以及 scope 外对象如何处理。
- 定义 pilot 主链如何选定、扩围和形成真实 evidence。
- 定义 cutover / fallback 如何判断，以及 adoption 成立需要交付哪些真实 evidence。
recommended_coverage_scope_name:
- pilot rollout feature
feature_owned_code_paths:
- cli/lib/rollout_state.py
- cli/lib/pilot_chain.py
- cli/commands/rollout/command.py
- cli/commands/audit/command.py
risk_focus:
- 要求 every test unit 都能回链到 FEAT acceptance、governing ADR 与 expected downstream evidence。
- pilot evidence 不完整却继续 rollout
- compat_mode / wave state / fallback trace 漂移
preconditions:
- 'Boundary to foundation FEATs: 本 FEAT 只负责接入、迁移与真实链路验证，不重写 foundation FEAT 与 ADR-005
  前置基础的能力定义。'
- 'Boundary to release/test planning: 本 FEAT 负责定义 adoption/E2E 能力边界和 pilot 目标，不替代后续
  release orchestration 或 test reporting。'
- foundation FEAT 对应主链已可执行。
- 至少一个真实 pilot scope 已被选定。
environment_assumptions:
- 需要可解析 selected FEAT 所依赖的集成环境与上游 artifact lineage。
- 需要能读取并追踪 FEAT、EPIC、SRC 与 governing ADR 引用。
- 需要保留 execution evidence 与 supervision evidence 所要求的最小审计链。
- 若启用 e2e 层且目标为 CLI sibling，必须具备可重复执行的 CLI 或跨服务集成上下文。
- 依赖服务或上游能力应以可观测、可判定的方式处于可用状态。
- 真实 pilot chain 需要 producer、gate、formal、consumer、audit 五段至少一条完整连通。
- wave state、compat_mode 与 cutover_guard_ref 必须可追溯且可回放。
