title: 批准后 Ready Job 生成流 Test Set
description: 冻结 approve 后 ready execution job 生成、approve-to-job lineage 和非 approve 阻断边界。
status: frozen
frozen_at: '2026-03-26T00:00:00+08:00'
candidate_package_ref: artifacts/feat-to-testset/adr018-runner-readyjob-testset-r1
coverage_scope:
  - 定义 approve 后必须产出的 ready execution job 及其最小字段。
  - 定义 ready job 的 authoritative refs、next skill target 和队列落点。
  - 定义 revise / retry / reject / handoff 与 ready job 生成的边界，避免 approve 语义漂移。
recommended_coverage_scope_name:
  - execution runner ready-job feature
feature_owned_code_paths:
  - cli/lib/ready_job_dispatch.py
  - cli/lib/job_queue.py
  - cli/commands/gate/command.py
risk_focus:
  - 要求 every test unit 都能回链到 FEAT acceptance、governing ADR 与 expected downstream evidence。
  - approve 被错误改写成 formal publication
  - ready job / lineage 不一致
preconditions:
  - selected FEAT 及其上游 source refs 可被稳定解析。
  - approve decision 已存在且 dispatchable。
  - ready queue writer 可写入 artifacts/jobs/ready。
environment_assumptions:
  - approve decision 与 next skill target 必须可解析为唯一 ready execution job。
  - artifacts/jobs/ready 写入与 approve-to-job lineage 需要可重复验证。
required_environment_inputs:
  data:
    - approve decision fixture
    - ready execution job fixture
    - approve-to-job lineage sample
  services:
    - ready job materializer
    - ready queue writer
  access:
    - 读取 approve decision、next skill target 与 authoritative input 的权限
    - ready queue writer identity 或等价 credential material
  ui_or_integration_context:
    - approve -> ready execution job -> queue publish integration context
test_layers:
  - integration
test_units:
  - unit_ref: TS-SRC-ADR018-ENTRY-SURFACE-R1-001-U01
    title: approve 结果只在允许时写入 ready execution job
    priority: P1
    trigger_action: dispatch finishes
    pass_conditions:
      - approve 后形成唯一 ready execution job。
      - approve-to-job lineage 可回链到 gate decision 与 target skill。
  - unit_ref: TS-SRC-ADR018-ENTRY-SURFACE-R1-001-U02
    title: 非 approve 路径不得泄漏 ready queue item
    priority: P1
    trigger_action: the approve path is described
    pass_conditions:
      - 非 approve 路径不会写入 artifacts/jobs/ready。
      - blocked / denied verdict 可审计。
  - unit_ref: TS-SRC-ADR018-ENTRY-SURFACE-R1-001-U03
    title: ready execution job 必须保持单一 authoritative queue lineage
    priority: P1
    trigger_action: dispatch evaluates the decision
    pass_conditions:
      - ready job 只保留一条 authoritative queue lineage。
      - 下游 runner 可直接用该 lineage 启动消费。
pass_criteria:
  - approve 后必须产出 ready execution job，并保留 approve-to-job lineage。
  - non-approve 路径不得生成 ready queue item。
evidence_required:
  - ready execution job evidence
  - approve-to-job lineage evidence
  - ready queue receipt
acceptance_traceability:
  - acceptance_ref: ready-job-emission-AC-01
    acceptance_scenario: Approve emits one ready job
    coverage_status: covered
  - acceptance_ref: ready-job-emission-AC-02
    acceptance_scenario: Approve is not rewritten as formal publication
    coverage_status: covered
  - acceptance_ref: ready-job-emission-AC-03
    acceptance_scenario: Non-approve decisions do not emit next-skill jobs
    coverage_status: covered
