coverage_exclusions:
- Do not redefine gate review vocabulary, reviewer responsibility, or candidate re-entry
  policy here.
- Do not define governed artifact paths, write modes, or repository-level IO enforcement
  here.
pass_criteria:
- 每条 acceptance check 都有至少一个可执行测试单元映射。
- TESTSET 不越界覆盖相邻 FEAT 或新需求。
- candidate package 在外置 approval 前保持 machine-readable traceability 与 gate subject
  identity。
- 高风险或 adoption/E2E 路径需要明确的环境、数据与 pilot execution 前提。
- formal_ref / lineage / admission verdict 必须形成单一 authoritative consumption path。
- lineage_missing 或 layer_violation 必须 fail closed。
evidence_required:
- analysis 与 strategy 形成过程的 execution evidence
- supervisor 对 TESTSET 与 traceability 的 review evidence
- candidate package 的 machine-readable gate subject records
- formal_ref resolution evidence
- lineage build / lineage_missing evidence
- admission verdict evidence
