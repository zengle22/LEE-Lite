risk_focus:
- 要求 every test unit 都能回链到 FEAT acceptance、governing ADR 与 expected downstream evidence。
- formal ref / lineage 缺失导致 downstream admission 漂移
- 跨层消费未 fail closed
preconditions:
- 'Boundary to 正式交接与物化能力: 本 FEAT 从 approved decision 之后开始，定义 formal publication package
  和 downstream admission，而不是定义 gate 审核动作本身。'
- 'Boundary to 主链文件 IO 与路径治理能力: 本 FEAT 定义对象资格与引用方向，path / mode 规则留给 IO 治理 FEAT。'
- approve decision object 已存在。
- formal publication / admission contract 可被解析。
environment_assumptions:
- 需要可解析 selected FEAT 所依赖的集成环境与上游 artifact lineage。
- 需要能读取并追踪 FEAT、EPIC、SRC 与 governing ADR 引用。
- 需要保留 execution evidence 与 supervision evidence 所要求的最小审计链。
- 依赖服务或上游能力应以可观测、可判定的方式处于可用状态。
- formal publication、formal ref 与 lineage 解析链必须可被重复验证。
- admission checker 必须能在缺少 lineage 或 formal ref 时 fail closed。
