title: 执行结果回写与重试边界流 Test Set
description: 冻结 authoritative outcome、retry-reentry、failure evidence binding 与结果可见性边界。
status: frozen
frozen_at: '2026-03-26T00:00:00+08:00'
candidate_package_ref: artifacts/feat-to-testset/adr018-runner-feedback-testset-r1
coverage_scope:
  - 定义 execution result、failure reason 和 retry / reentry directive 的 authoritative 结果。
  - 定义 job 从 running 进入 done / failed / retry_return 的状态边界。
  - 定义 runner 输出如何服务上游审计、下游继续推进和失败恢复。
recommended_coverage_scope_name:
  - execution runner feedback feature
feature_owned_code_paths:
  - cli/lib/job_outcome.py
  - cli/lib/execution_runner.py
  - cli/commands/job/command.py
risk_focus:
  - 要求 every test unit 都能回链到 FEAT acceptance、governing ADR 与 expected downstream evidence。
  - outcome 缺失或多写
  - failure evidence 与 retry-reentry 漂移
preconditions:
  - execution attempt record 已存在。
  - downstream skill result 与 failure evidence 可回链到 runner。
environment_assumptions:
  - execution outcome、retry-reentry 与 failure evidence 必须能绑定到同一个 execution attempt。
  - feedback 结果必须保持 authoritative，可被 orchestration 与 monitor 消费。
required_environment_inputs:
  data:
    - execution attempt fixture
    - done/failed/retry outcome sample
    - failure evidence sample
  services:
    - outcome collector
    - outcome writer
    - failure evidence binder
  access:
    - 读取 downstream execution result 与写回 execution outcome 的权限
    - outcome writer credential 或等价账号材料
  ui_or_integration_context:
    - runner post-dispatch feedback integration context
test_layers:
  - integration
test_units:
  - unit_ref: TS-SRC-003-006-U01
    title: done / failed / retry-reentry 形成单一 authoritative outcome
    priority: P1
    trigger_action: the result is recorded
    pass_conditions:
      - 每个 execution attempt 只写入一个 authoritative outcome。
      - done / failed / retry-reentry 语义互斥。
  - unit_ref: TS-SRC-003-006-U02
    title: failure evidence 与 retry-reentry directive 可追溯
    priority: P1
    trigger_action: the runner records the outcome
    pass_conditions:
      - failure evidence 与 retry-reentry directive 绑定到同一 execution attempt。
      - orchestration 可直接消费 retry directive。
  - unit_ref: TS-SRC-003-006-U03
    title: feedback 结果保持 authoritative 并对 monitor 可见
    priority: P1
    trigger_action: the flow after gate approval is inspected
    pass_conditions:
      - monitor 读取到的结果与 authoritative outcome 一致。
      - feedback 不通过侧写目录或临时日志推断。
pass_criteria:
  - done / failed / retry-reentry 必须形成单一 authoritative outcome。
  - failure evidence 与 retry-reentry directive 必须可追溯。
evidence_required:
  - execution outcome evidence
  - retry-reentry directive evidence
  - failure evidence binding
acceptance_traceability:
  - acceptance_ref: execution-feedback-AC-01
    acceptance_scenario: Execution outcomes are explicit
    coverage_status: covered
  - acceptance_ref: execution-feedback-AC-02
    acceptance_scenario: Retry returns to execution semantics
    coverage_status: covered
  - acceptance_ref: execution-feedback-AC-03
    acceptance_scenario: Approve is not treated as terminal
    coverage_status: covered
