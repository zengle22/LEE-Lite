  - cli/commands/loop/command.py
risk_focus:
  - 要求 every test unit 都能回链到 FEAT acceptance、governing ADR 与 expected downstream evidence。
  - 监控面靠目录猜状态
  - waiting-human / deadletter 状态不可见
preconditions:
  - selected FEAT 及其上游 source refs 可被稳定解析。
  - ready queue、running ownership 与 outcome records 可被读取。
  - status projector 可聚合 runner state。
environment_assumptions:
  - 需要可解析 selected FEAT 所依赖的集成环境与上游 artifact lineage。
  - 需要能读取并追踪 FEAT、EPIC、SRC 与 governing ADR 引用。
  - ready backlog、running、failed、deadletters、waiting-human 状态必须来自 authoritative runner records。
  - observability snapshot 必须可追溯到 queue、ownership 与 outcome source。
required_environment_inputs:
  environment:
    - 可运行 selected FEAT 的集成环境
    - 可解析 source_refs 的受治理 workspace 上下文
  data:
    - runner observability snapshot
    - ready/running/failed status sample
    - waiting-human / deadletter sample
  services:
    - runner status projector
    - observability snapshot query service
  access:
    - 读取 ready queue、running ownership、dispatch lineage 与 outcome records 的权限
    - runner monitor identity 或等价 credential material
  ui_or_integration_context:
    - runner backlog / running / failed / waiting-human monitor context
test_layers:
  - integration
test_units:
  - unit_ref: TS-SRC-ADR018-ENTRY-SURFACE-R1-007-U01
    title: 监控面覆盖 ready backlog / running / failed / waiting-human / deadletters
    priority: P1
    trigger_action: an operator inspects the monitoring surface
    pass_conditions:
      - 监控面覆盖 ready backlog、running、failed、waiting-human、deadletters。
      - 状态缺失时返回明确 verdict。
  - unit_ref: TS-SRC-ADR018-ENTRY-SURFACE-R1-007-U02
    title: monitor snapshot 可回链到 authoritative runner records
    priority: P1
    trigger_action: the operator reads the monitoring surface
    pass_conditions:
      - 每个 monitor bucket 都可回链到 queue、ownership 或 outcome source。
      - snapshot 不依赖目录扫描猜测状态。
  - unit_ref: TS-SRC-ADR018-ENTRY-SURFACE-R1-007-U03
    title: 监控面保持只读，不承担控制或 dispatch 职责
    priority: P1
    trigger_action: FEAT-SRC-ADR018-ENTRY-SURFACE-R1-007 is reviewed as a product surface
    pass_conditions:
      - monitor surface 只做查询与展示。
      - monitor 不直接 claim、dispatch 或重写 outcome。
coverage_exclusions:
  - 不覆盖 selected FEAT 之外的相邻 FEAT 语义。
  - 不把本 TESTSET 扩展为 TASK、TECH 或 runner-level 实现细节。
pass_criteria:
  - 每条 acceptance check 都有至少一个可执行测试单元映射。
  - 监控面必须覆盖 ready backlog、running、failed、deadletters、waiting-human 状态。
  - 监控面只能读取 authoritative runner records，不得扫目录猜状态。
evidence_required:
