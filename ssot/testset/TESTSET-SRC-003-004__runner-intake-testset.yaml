coverage_scope:
  - 定义 runner 扫描、claim、running 和防重入边界。
  - 定义 jobs/ready 到 runner ownership 的状态转移。
  - 定义 runner 对 job lineage、claim 证据和并发责任的记录方式。
recommended_coverage_scope_name:
  - execution runner intake feature
feature_owned_code_paths:
  - cli/lib/job_queue.py
  - cli/lib/job_state.py
  - cli/commands/job/command.py
risk_focus:
  - 要求 every test unit 都能回链到 FEAT acceptance、governing ADR 与 expected downstream evidence。
  - single-owner claim 失效
  - job_not_ready / already_claimed 不可追溯
preconditions:
  - ready execution job 已进入 artifacts/jobs/ready。
  - single-owner claim guard 可输出 authoritative verdict。
environment_assumptions:
  - ready queue scan 与 single-owner claim 需要可重复执行且可判定冲突。
  - running ownership record 必须对后续 dispatch 可见。
required_environment_inputs:
  data:
    - ready execution job fixture
    - claim conflict failure sample
    - running ownership record sample
  services:
    - ready queue scanner
    - single-owner claimer
  access:
    - 读取 artifacts/jobs/ready 与写回 running ownership 的权限
    - queue claim identity 或等价 credential material
  ui_or_integration_context:
    - runner queue intake integration context
test_layers:
  - integration
test_units:
  - unit_ref: TS-SRC-003-004-U01
    title: ready queue intake 维持 single-owner claim 语义
    priority: P1
    trigger_action: Execution Loop Job Runner runs
    pass_conditions:
      - 同一 ready job 只被一个 runner 成功 claim。
      - claim 后形成 running ownership record。
  - unit_ref: TS-SRC-003-004-U02
    title: claim conflict 与 job_not_ready 路径必须 fail closed
    priority: P1
    trigger_action: claim is attempted
    pass_conditions:
      - claim conflict / job_not_ready 均返回 authoritative denied verdict。
      - queue 状态不会被静默篡改。
  - unit_ref: TS-SRC-003-004-U03
    title: running ownership 必须对 dispatch 与 monitor 可见
    priority: P1
    trigger_action: the start condition is resolved
    pass_conditions:
      - dispatch 与 observability 都能读取同一 running ownership record。
      - ownership 不因 queue scan 重放而丢失。
pass_criteria:
  - ready queue consumption 必须保持 single-owner claim 语义。
  - claim conflict、job_not_ready 等失败路径必须可追溯且 fail closed。
evidence_required:
  - ready queue scan evidence
  - claim receipt
  - running ownership record
acceptance_traceability:
  - acceptance_ref: runner-intake-AC-01
    acceptance_scenario: Ready queue is auto-consumed
    coverage_status: covered
  - acceptance_ref: runner-intake-AC-02
