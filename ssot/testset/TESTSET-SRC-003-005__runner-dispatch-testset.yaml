epic_ref: EPIC-SRC-003-001
src_ref: SRC-003
title: 下游 Skill 自动派发流 Test Set
description: 冻结 target skill 解析、authoritative input lineage 与自动 dispatch 边界。
status: frozen
frozen_at: '2026-03-26T00:00:00+08:00'
candidate_package_ref: artifacts/feat-to-testset/adr018-runner-dispatch-testset-r1
coverage_scope:
  - 定义 next skill target、输入包引用和调用边界。
  - 定义 runner 把 claimed job 交给下游 skill 时的 authoritative invocation 记录。
  - 定义执行启动失败时如何回写 runner 结果而不是静默丢失。
recommended_coverage_scope_name:
  - execution runner dispatch feature
feature_owned_code_paths:
  - cli/lib/skill_invoker.py
  - cli/lib/execution_runner.py
  - cli/commands/job/command.py
risk_focus:
  - 要求 every test unit 都能回链到 FEAT acceptance、governing ADR 与 expected downstream evidence。
  - target skill / authoritative input 解析漂移
  - dispatch 退化成 manual relay
preconditions:
  - claimed execution job 已形成 running ownership。
  - target skill ref 与 authoritative input 可被解析。
environment_assumptions:
  - target skill ref 与 authoritative input 必须能从 claimed job 唯一解析。
  - next-skill invocation 与 execution attempt 必须保留 lineage。
required_environment_inputs:
  data:
    - claimed job fixture
    - target skill ref sample
    - authoritative input sample
  services:
    - target skill resolver
    - skill invocation adapter
  access:
    - 调用目标 governed skill 并读取 invocation / execution attempt record 的权限
    - dispatch invoker credential 或等价账号材料
  ui_or_integration_context:
    - claimed job -> next skill invocation integration context
test_layers:
  - integration
test_units:
  - unit_ref: TS-SRC-003-005-U01
    title: claimed job 派发到声明的 target skill
    priority: P1
    trigger_action: dispatch starts
    pass_conditions:
      - dispatch 只调用声明的 target skill。
      - execution attempt record 可回链到 claimed job。
  - unit_ref: TS-SRC-003-005-U02
    title: dispatch 保留 authoritative input lineage
    priority: P1
    trigger_action: audit inspects the invocation
    pass_conditions:
      - dispatch 使用的输入与 claimed job authoritative input 一致。
      - lineage binding 可回放。
  - unit_ref: TS-SRC-003-005-U03
    title: dispatch 不退化为第三会话人工接力
    priority: P1
    trigger_action: the next step after approve is reviewed
    pass_conditions:
      - dispatch 由 runner 自动完成，不要求第三会话人工 relay。
      - operator intervention 仅限治理例外，不是正常主链路径。
pass_criteria:
  - claimed job 必须派发到声明的 target skill，并保留 authoritative input lineage。
  - dispatch 不得退化成第三会话人工接力。
evidence_required:
  - next-skill invocation evidence
  - execution attempt record
  - dispatch lineage trace
acceptance_traceability:
  - acceptance_ref: next-skill-dispatch-AC-01
    acceptance_scenario: Claimed job invokes the declared next skill
    coverage_status: covered
  - acceptance_ref: next-skill-dispatch-AC-02
    acceptance_scenario: Dispatch preserves lineage
    coverage_status: covered
  - acceptance_ref: next-skill-dispatch-AC-03
    acceptance_scenario: Dispatch does not regress to human relay
    coverage_status: covered
