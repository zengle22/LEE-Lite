coverage_exclusions:
- 不覆盖 selected FEAT 之外的相邻 FEAT 语义。
- 不把本 TESTSET 扩展为 TASK、TECH 或 runner-level 实现细节。
pass_criteria:
- 每条 acceptance check 都有至少一个可执行测试单元映射。
- TESTSET 不越界覆盖相邻 FEAT 或新需求。
- candidate package 在外置 approval 前保持 machine-readable traceability 与 gate subject
  identity。
- 高风险或 adoption/E2E 路径需要明确的环境、数据与 pilot execution 前提。
- approve 后必须产出 ready execution job，并保留 approve-to-job lineage。
- non-approve 路径不得生成 ready queue item。
evidence_required:
- analysis 与 strategy 形成过程的 execution evidence
- supervisor 对 TESTSET 与 traceability 的 review evidence
- candidate package 的 machine-readable gate subject records
- ready execution job evidence
- approve-to-job lineage evidence
- ready queue receipt
