semantic_lock:
  domain_type: execution_runner_rule
  one_sentence_truth: gate approve 后必须生成 ready execution job，并由 Execution Loop Job
    Runner 自动消费 artifacts/jobs/ready 后推进到下一个 skill，而不是停在 formal publication 或人工接力。
  primary_object: execution_loop_job_runner
  lifecycle_stage: post_gate_auto_progression
  allowed_capabilities:
  - ready_execution_job_materialization
  - ready_queue_consumption
  - next_skill_dispatch
  - execution_result_recording
  - retry_reentry_return
  forbidden_capabilities:
  - formal_publication_substitution
  - admission_only_decomposition
  - third_session_human_relay
  - directory_guessing_consumer
  inheritance_rule: approve semantics must stay coupled to ready-job emission and
    runner-driven next-skill progression; downstream may not replace this with formal
    publication or admission-only flows.
