coverage_exclusions:
- Do not define object qualification, candidate/formal authority, or consumer admission
  semantics here.
- Do not re-implement ADR-005 Gateway / Path Policy / Registry modules or widen them
  into repository-wide governance here.
pass_criteria:
- 每条 acceptance check 都有至少一个可执行测试单元映射。
- TESTSET 不越界覆盖相邻 FEAT 或新需求。
- candidate package 在外置 approval 前保持 machine-readable traceability 与 gate subject
  identity。
- commit-governed / read-governed 成功路径必须返回 receipt_ref、registry_record_ref、managed_artifact_ref。
- policy_deny / registry_prerequisite_failed / receipt_pending 必须留下可追溯结果且不得 fallback。
evidence_required:
- analysis 与 strategy 形成过程的 execution evidence
- supervisor 对 TESTSET 与 traceability 的 review evidence
- candidate package 的 machine-readable gate subject records
- receipt_ref
- registry_record_ref
- managed_artifact_ref
- policy_deny / registry_prerequisite_failed / receipt_pending evidence
