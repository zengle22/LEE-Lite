- receipt / registry record 不可追溯
preconditions:
- 'Boundary to 对象分层与准入能力: 本 FEAT 定义对象落盘边界，不定义对象层级与消费资格本身。'
- 'Boundary to 正式交接与物化能力: 本 FEAT 约束 formalization 的 IO/path 边界，但 formalization 决策语义仍属于正式交接
  FEAT。'
- 'Boundary to ADR-005 prerequisite foundation: 本 FEAT 只消费已交付的 Gateway / Path Policy
  / Registry 能力，不在此重写其模块边界。'
- Gateway / Path Policy / Registry 已接入主链。
- managed write/read preflight 可独立输出 verdict。
environment_assumptions:
- 需要可解析 selected FEAT 所依赖的集成环境与上游 artifact lineage。
- 需要能读取并追踪 FEAT、EPIC、SRC 与 governing ADR 引用。
- 需要保留 execution evidence 与 supervision evidence 所要求的最小审计链。
- 依赖服务或上游能力应以可观测、可判定的方式处于可用状态。
- Gateway / Path Policy / Registry 必须在同一受治理链路中返回稳定 verdict。
- receipt_ref、registry_record_ref 与 managed_artifact_ref 解析上下文必须可观测。
