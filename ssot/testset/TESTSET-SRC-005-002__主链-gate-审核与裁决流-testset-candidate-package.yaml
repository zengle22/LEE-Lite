- formal trigger 与 revise/retry 流混层
preconditions:
- 'Boundary to 主链协作闭环能力: 本 FEAT 消费 loop 协作产物，但不重写 execution / gate / human 的责任分工、状态流转与回流条件。'
- 'Boundary to 对象分层与准入能力: 本 FEAT 定义 candidate 到 decision 以及 decision 到 formal 发布 trigger
  的推进链，不定义 consumer admission 与读取资格。'
environment_assumptions:
- 需要可解析 selected FEAT 所依赖的集成环境与上游 artifact lineage。
- 需要能读取并追踪 FEAT、EPIC、SRC 与 governing ADR 引用。
- 需要保留 execution evidence 与 supervision evidence 所要求的最小审计链。
- 依赖服务或上游能力应以可观测、可判定的方式处于可用状态。
- candidate -> gate decision -> formal trigger 的业务链路必须只有一条 authoritative path。
- decision object 的唯一性与回流目标必须可观测。
