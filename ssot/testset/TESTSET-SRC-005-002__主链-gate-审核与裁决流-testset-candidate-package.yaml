coverage_exclusions:
- Do not redefine execution / gate / human loop responsibility splits or re-entry
  conditions here.
- Do not define consumer admission, formal-ref eligibility, or path enforcement policy
  here.
pass_criteria:
- 每条 acceptance check 都有至少一个可执行测试单元映射。
- TESTSET 不越界覆盖相邻 FEAT 或新需求。
- candidate package 在外置 approval 前保持 machine-readable traceability 与 gate subject
  identity。
- gate decision path 必须唯一，decision object 不得并行分叉。
- formal publication 只由 approve decision object 触发。
evidence_required:
- analysis 与 strategy 形成过程的 execution evidence
- supervisor 对 TESTSET 与 traceability 的 review evidence
- candidate package 的 machine-readable gate subject records
- decision object evidence
- approve / revise / retry / handoff / reject routing evidence
