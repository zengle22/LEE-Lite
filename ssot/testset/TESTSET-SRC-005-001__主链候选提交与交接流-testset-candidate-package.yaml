- unit_ref: TS-SRC-005-001-U06
  title: revise / retry decision return 必须回到 runtime re-entry，而不是泄漏 approval 语义
  priority: P0
  input_preconditions:
  - A candidate package has been submitted into the mainline
  - handoff 已进入 gate decision 链。
  trigger_action: 分别对已提交 handoff 触发 revise 与 retry decision，并读取 runtime return。
  observation_points:
  - reentry_directive_ref
  - boundary_handoff_ref
  - decision_type
  - routing hint
  pass_conditions:
  - revise / retry 必须生成 runtime re-entry directive。
  - response 不得泄漏 approve / freeze / publication 完成语义。
  - decision return 必须保持与 handoff 同一条 authoritative trace。
  fail_conditions:
  - revise / retry 没有生成 reentry directive。
  - decision return 被误标成 approve / freeze / publication 完成。
  required_evidence:
