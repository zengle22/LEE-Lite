- unit_ref: TS-SRC-005-001-U01
  title: candidate submit-mainline 明确 execution / gate / human loop 的责任边界
  priority: P0
  input_preconditions:
  - candidate package 已就绪且准备进入主链 handoff。
  - 'Boundary to 正式交接与物化能力: 本 FEAT 只负责协作责任、状态流转与回流条件，不负责 formalization 语义、升级判定与物化结果。'
  - 'Boundary to 对象分层与准入能力: 本 FEAT 可以要求对象交接，但对象是否具备正式消费资格由对象分层 FEAT 决定。'
  trigger_action: 执行 candidate package submit-mainline，并记录 execution loop、gate loop、human
    loop 的 transition ownership。
  observation_points:
  - authoritative handoff submission
  - loop ownership map
  - return path / re-entry target
  - decision-driven runtime routing boundary
  pass_conditions:
  - 每个 loop 只拥有一类明确 transition。
  - handoff 不挟带 gate decision issuance 或 approval authority。
  - revise/retry routing 由 runtime 持有而不是由业务 skill 私下拼接。
  fail_conditions:
  - loop ownership 重叠。
  - candidate submit-mainline 暗含 gate decision / publication 职责。
  required_evidence:
  - handoff submission evidence
  - loop transition trace
  - ownership snapshot
