- unit_ref: TS-SRC-005-001-U04
  title: duplicate_submission 相同 payload 必须返回 idempotent replay 结果
  priority: P0
  input_preconditions:
  - A candidate package has been submitted into the mainline
  - 同一 proposal_ref 与同一 payload 被再次提交。
  trigger_action: 对同一 payload 重复执行 submit-mainline，并对比返回的 handoff_ref 与 replay 语义。
  observation_points:
  - handoff_ref stability
  - retryable / idempotent_replay flags
  - response envelope reuse
  pass_conditions:
  - 重复提交相同 payload 时必须复用同一 handoff_ref。
  - response envelope 必须明确 retryable=true 与 idempotent_replay=true。
  - 不得因重复提交生成第二个 pending queue item identity。
  fail_conditions:
  - 相同 payload 重复提交生成新的 handoff_ref。
  - 缺少 retryable 或 idempotent_replay 标记。
  required_evidence:
  - duplicate submission evidence
  - handoff_ref comparison
  - idempotent replay response snapshot
