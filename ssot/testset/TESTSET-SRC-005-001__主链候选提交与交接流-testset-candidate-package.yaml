title: 主链候选提交与交接流 Test Set
description: 主链候选提交与交接流 governed QA candidate package
derived_slug: u4e3b-u94fe-u5019-u9009-u63d0-u4ea4-u4e0e-u4ea4-u63a5-u6d41
coverage_scope:
- 定义 candidate package、proposal、evidence 在什么触发场景下被提交。
- 定义提交后形成什么 authoritative handoff object。
- 定义提交完成后对上游和 gate 分别暴露什么业务结果。
recommended_coverage_scope_name:
- mainline collaboration feature
feature_owned_code_paths:
- cli/lib/mainline_runtime.py
- cli/lib/reentry.py
- cli/lib/gate_collaboration_actions.py
risk_focus:
- 要求 every test unit 都能回链到 FEAT acceptance、governing ADR 与 expected downstream evidence。
- queue / handoff / re-entry contract 漂移
- duplicate_submission 不可判定或被错误覆盖
preconditions:
- 'Boundary to 正式交接与物化能力: 本 FEAT 只负责协作责任、状态流转与回流条件，不负责 formalization 语义、升级判定与物化结果。'
- 'Boundary to 对象分层与准入能力: 本 FEAT 可以要求对象交接，但对象是否具备正式消费资格由对象分层 FEAT 决定。'
environment_assumptions:
- 需要可解析 selected FEAT 所依赖的集成环境与上游 artifact lineage。
- 需要能读取并追踪 FEAT、EPIC、SRC 与 governing ADR 引用。
- 需要保留 execution evidence 与 supervision evidence 所要求的最小审计链。
- 依赖服务或上游能力应以可观测、可判定的方式处于可用状态。
required_environment_inputs:
  environment:
  - 可运行 selected FEAT 的集成环境
  - 可解析 source_refs 的受治理 workspace 上下文
  data:
  - 覆盖 FEAT acceptance checks 所需的最小测试数据或 fixtures
  - 可重建 analysis/strategy trace 的输入样本
  - authoritative handoff submission
  - pending_state / gate_pending_ref / assigned_gate_queue fixture
  - duplicate payload replay / mismatch failure samples
  services:
  - selected FEAT 所依赖的集成服务或协作 consumer
  - handoff runtime
  - pending visibility reader
  - runtime re-entry writer
  access:
  - 读取 FEAT candidate / freeze lineage 所需权限
  - 执行 QA evidence 采集与落盘所需权限
  - handoff service identity 或等价账号材料
  - 读取 trace_ref、canonical_payload_path、reentry_directive 的权限
  feature_flags:
  - selected FEAT 涉及的 gated rollout、cutover 或 guarded branch 开关
  - idempotent replay guard / decision return routing guard
  ui_or_integration_context:
  - 驱动 FEAT acceptance checks 的 CLI 命令、接口调用或 integration context
  - authoritative handoff / pending visibility integration context
test_layers:
- integration
