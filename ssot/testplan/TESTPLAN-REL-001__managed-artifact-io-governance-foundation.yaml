entry_criteria:
- REL-001 v2 已 accepted 且 manifest / dependency matrix 未漂移。
- 五份 TESTSET 已完成 analysis、strategy、review、validation。
- 最小集成路径（loop object -> handoff decision -> formal admission -> mainline IO/path ->
  pilot chain evidence）已可执行。
- 若 pilot 含 gate branch，必须显式声明其只验证 guarded semantics。
exit_criteria:
- 五个 critical test sets 在 exit 时必须处于最新有效通过状态。
- 无 P0 bug 未关闭，跨五轴 FEAT 的 P1 bug <= 2。
- 至少一条真实 producer -> consumer -> audit -> gate pilot 主链已形成 evidence；若 gate branch
  存在则只允许 guarded 结论。
- 测试报告必须包含五轴 summary、bug 分级统计、pilot chain evidence 摘要，以及 release closure 输入状态。
