e2e_journey_spec:
  case_id: "e2e_case.onboarding.create-plan.main"
  coverage_id: "e2e.onboarding.create-plan.main"
  journey_id: "onboarding.create-plan"
  entry_point: "http://localhost:3000/login"
  preconditions:
    - "web_server_running"
  user_steps:
    - step_number: 1
      action: "fill"
      target: "#username"
      data: { value: "testuser" }
      expected_result: "username field populated"
    - step_number: 2
      action: "click"
      target: "#login-btn"
      data: null
      expected_result: "navigate to dashboard"
  expected_ui_states:
    - selector: "h1"
      expected_text: "Dashboard"
      expected_visible: true
  expected_network_events: []
  expected_persistence:
    - check: "reload_page_keeps_dashboard_state"
      expected: "dashboard still visible after reload"
  anti_false_pass_checks:
    - "no_console_errors"
  evidence_required:
    - "screenshot_final"
    - "dom_assertions"
    - "console_errors"
