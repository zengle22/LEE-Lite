api_test_spec:
  case_id: "api_case.plan.get.happy"
  coverage_id: "api.training_plan.get.happy"
  endpoint: "GET /api/v1/training-plans/{plan_id}"
  capability: "get_plan"

  preconditions:
    - "authenticated_user_exists"
    - "training_plan_exists('test-plan-002')"

  request:
    method: "GET"
    path_params:
      plan_id: "test-plan-002"
    query_params: null
    headers: null
    body: null

  expected:
    status_code: 200
    response_assertions:
      - "response.id == 'test-plan-002'"
      - "response.name is not null"
    side_effect_assertions: []
    response_schema:
      type: object
      required:
        - id
        - name
        - start_date
        - end_date
        - goal
        - status

  cleanup:
    - "delete_training_plan('test-plan-002')"

  evidence_required:
    - "request_snapshot"
    - "response_snapshot"
