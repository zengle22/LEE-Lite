api_test_spec:
  case_id: "api_case.plan.create.duplicate-name"
  coverage_id: "api.training_plan.create.state_constraint"
  endpoint: "POST /api/v1/training-plans"
  capability: "create_plan"

  preconditions:
    - "authenticated_user_exists"
    - "training_plan_exists('existing-plan')"

  request:
    method: "POST"
    path_params: null
    query_params: null
    headers:
      Content-Type: "application/json"
    body:
      name: "existing-plan"
      start_date: "2026-07-01"
      end_date: "2026-09-30"
      goal: "Duplicate name test"

  expected:
    status_code: 409
    response_assertions:
      - "response.error_code == 'DUPLICATE_NAME'"
    side_effect_assertions:
      - "no_new_training_plan_created()"
    response_schema: null

  cleanup:
    - "delete_training_plan('existing-plan')"

  evidence_required:
    - "request_snapshot"
    - "response_snapshot"
    - "db_assertion_result"
