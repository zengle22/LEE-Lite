api_test_spec:
  case_id: "api_case.plan.update.happy"
  coverage_id: "api.training_plan.update.happy"
  endpoint: "PUT /api/v1/training-plans/{plan_id}"
  capability: "update_plan"

  preconditions:
    - "authenticated_user_exists"
    - "training_plan_exists('test-plan-003')"

  request:
    method: "PUT"
    path_params:
      plan_id: "test-plan-003"
    query_params: null
    headers:
      Content-Type: "application/json"
    body:
      start_date: "2026-05-01"
      end_date: "2026-08-31"
      goal: "Updated goal for training plan"

  expected:
    status_code: 200
    response_assertions:
      - "response.id == 'test-plan-003'"
      - "response.start_date == '2026-05-01'"
      - "response.goal == 'Updated goal for training plan'"
      - "response.name == response.original_name"
    side_effect_assertions:
      - "training_plan_updated_in_db('test-plan-003')"
    response_schema: null

  cleanup:
    - "delete_training_plan('test-plan-003')"

  evidence_required:
    - "request_snapshot"
    - "response_snapshot"
    - "db_assertion_result"
