api_test_spec:
  case_id: "api_case.plan.create.happy"
  coverage_id: "api.training_plan.create.happy"
  endpoint: "POST /api/v1/training-plans"
  capability: "create_plan"

  preconditions:
    - "authenticated_user_exists"

  request:
    method: "POST"
    path_params: null
    query_params: null
    headers:
      Content-Type: "application/json"
    body:
      name: "Q2 产品增长训练营"
      start_date: "2026-04-01"
      end_date: "2026-06-30"
      goal: "掌握产品增长方法论和实践技能"

  expected:
    status_code: 201
    response_assertions:
      - "response.id is not null"
      - "response.name == 'Q2 产品增长训练营'"
      - "response.status == 'active'"
    side_effect_assertions:
      - "training_plan_exists_in_db(response.id) == true"
    response_schema:
      type: object
      required:
        - id
        - name
        - start_date
        - end_date
        - goal
        - status
        - created_at

  cleanup:
    - "delete_training_plan(response.id)"

  evidence_required:
    - "request_snapshot"
    - "response_snapshot"
    - "db_assertion_result"
