api_test_plan:
  feature_id: "feat-pilot-001"

  source_feat_refs:
    - "feat-pilot-001.scope"
    - "feat-pilot-001.acceptance"

  api_objects:
    - name: "training_plan"
      capabilities:
        - "create_plan"
        - "get_plan"
        - "update_plan"
    - name: "feedback"
      capabilities:
        - "submit_feedback"

  priorities:
    p0:
      - "create_plan"
      - "submit_feedback"
    p1:
      - "get_plan"
      - "update_plan"
    p2: []

  cut_records:
    - capability: "create_plan"
      dimension: "幂等/重试/并发"
      cut_reason: "P0 能力，试点阶段无并发场景，创建操作为离散事件"
      source_ref: "ADR-047 Section 4.1.3"
    - capability: "submit_feedback"
      dimension: "幂等/重试/并发"
      cut_reason: "P0 能力，试点阶段反馈提交为单向操作，无并发需求"
      source_ref: "ADR-047 Section 4.1.3"
    - capability: "get_plan"
      dimension: "边界值"
      cut_reason: "P1 能力，查询操作无连续数值边界"
      source_ref: "ADR-047 Section 4.1.3"
    - capability: "get_plan"
      dimension: "状态约束"
      cut_reason: "P1 能力，状态约束裁剪"
      source_ref: "ADR-047 Section 4.1.3"
    - capability: "get_plan"
      dimension: "权限与身份"
      cut_reason: "P1 能力，试点阶段无鉴权层"
      source_ref: "ADR-047 Section 4.1.3"
    - capability: "get_plan"
      dimension: "幂等/重试/并发"
      cut_reason: "P1 能力，并发场景裁剪"
      source_ref: "ADR-047 Section 4.1.3"
    - capability: "update_plan"
      dimension: "边界值"
      cut_reason: "P1 能力，更新操作为离散字段修改，无连续边界"
      source_ref: "ADR-047 Section 4.1.3"
    - capability: "update_plan"
      dimension: "状态约束"
      cut_reason: "P1 能力，状态约束裁剪"
      source_ref: "ADR-047 Section 4.1.3"
    - capability: "update_plan"
      dimension: "权限与身份"
      cut_reason: "P1 能力，试点阶段无鉴权层"
      source_ref: "ADR-047 Section 4.1.3"
    - capability: "update_plan"
      dimension: "幂等/重试/并发"
      cut_reason: "P1 能力，并发场景裁剪"
      source_ref: "ADR-047 Section 4.1.3"

  notes: "ADR-047 dual-chain pilot — minimal feat with 2 API objects, 4 capabilities"
