# Pilot Training Plan Feature

## 目标

验证 ADR-047 双链治理架构的可执行性，通过最小可行 feat 跑通完整 API 测试链。

## 范围

- **training_plan** API 对象:
  - `create_plan` (P0): 创建培训计划，接收课程名称、时间范围、目标描述
  - `get_plan` (P1): 查询已有培训计划，按 ID 或名称检索
  - `update_plan` (P1): 更新培训计划的时间范围和目标描述

- **feedback** API 对象:
  - `submit_feedback` (P0): 提交对培训计划的反馈，包含评分和改进建议

## 约束

- 培训计划必须有非空的课程名称和有效的时间范围
- 反馈评分必须在 1-5 范围内
- 更新计划时不得修改已冻结的课程名称

## 验收标准

- create_plan 能正确创建计划并返回 201
- submit_feedback 能正确提交有效反馈并返回 201
- get_plan 对不存在的 ID 返回 404
- update_plan 对非法输入返回 400
