# ADR-047 QA Schema: API Coverage Manifest
# Source: ADR-047 §4.1.5 B + §15 (Manifest State Machine)
# Scope: coverage ledger — tracks status of each coverage item
# Must NOT contain: test design details, assertion logic, script content

api_coverage_manifest:
  items:
    - coverage_id: string       # unique ID, e.g., api.plan.create.happy
      feature_id: string        # source feature, e.g., feat.training-plan.create
      capability: string        # API capability name
      endpoint: string          # HTTP method + path, e.g., POST /api/plans
      scenario_type: string     # e.g., happy_path, validation, boundary, permission, error, idempotent
      priority: enum[P0, P1, P2]
      source_feat_ref: string   # feat reference for traceability

      # Coverage dimensions addressed
      dimensions_covered:
        - string  # e.g., 正常路径, 参数校验, 边界值, 状态约束, 权限与身份, 异常路径, 幂等/重试/并发, 数据副作用

      # Case mapping
      mapped_case_ids:
        - string  # e.g., api_case.plan.create.happy

      # Layered status fields (ADR-047 §15 A.1)
      lifecycle_status: enum[drafted, designed, generated, executable, executed, passed, failed, blocked, waived]
      mapping_status: enum[unmapped, mapped, superseded]
      evidence_status: enum[missing, partial, complete]
      waiver_status: enum[none, pending, approved, rejected]

      # Evidence references (populated after execution)
      evidence_refs:
        - string  # file path to evidence YAML

      # Execution tracking
      rerun_count: integer      # initial value: 0
      last_run_id: string | null  # last execution run ID
      obsolete: boolean         # true if upstream change invalidated this item
      superseded_by: string | null  # coverage_id that supersedes this one
