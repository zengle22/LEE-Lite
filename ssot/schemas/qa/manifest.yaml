# API Coverage Manifest YAML Schema (ADR-047 §4.1.5 B)
# Generated by ll-qa-api-manifest-init, consumed by ll-qa-api-spec-gen.

api_coverage_manifest:
  items:
    - coverage_id: string         # Unique identifier, e.g., "COV-0001"
      feature_id: string          # References the parent feature
      capability: string          # What capability this item covers
      endpoint: string            # API endpoint, e.g., "POST /api/v1/training"
      scenario_type: enum[happy_path, validation, boundary, permission, error, idempotent, state_constraint, concurrency, data_sideeffect]
      priority: enum[P0, P1, P2]
      source_feat_ref: string     # Reference to source feature
      dimensions_covered:
        - string
      mapped_case_ids:
        - string
      lifecycle_status: enum[drafted, designed, generated, executable, executed, passed, failed, blocked, waived]  # default: designed
      mapping_status: enum[unmapped, mapped, superseded]  # default: unmapped
      evidence_status: enum[missing, partial, complete]   # default: missing
      waiver_status: enum[none, pending, approved, rejected]  # default: none
      evidence_refs:
        - string
      rerun_count: integer        # default: 0
      last_run_id: string | null
      obsolete: boolean           # default: false
      superseded_by: string | null
      patch_affected: boolean     # true if any Patch with test_impact affects this item
      patch_refs:                 # list of patch IDs that affected this item
        - string                  # e.g., "UXPATCH-0001"
