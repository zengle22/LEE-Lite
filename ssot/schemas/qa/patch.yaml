# ADR-049 QA Schema: Experience Patch
# Source: ADR-049 §5.3, §5.1
# Scope: defines the structure of individual experience patch YAML files
# Must NOT contain: execution logic, script content

experience_patch:
  # ============================================================
  # Required top-level fields (10 fields)
  # ============================================================

  id: string              # UXPATCH-0001 format (4-digit zero-padded sequence, hyphen not underscore)
  type: string            # fixed value: "experience_patch"
  status: enum[draft, active, validated, pending_backwrite, backwritten, retain_in_code, upgraded_to_src, superseded, discarded, archived]
  created_at: datetime    # ISO 8601 timestamp, e.g., "2026-04-16T10:00:00Z"
  updated_at: datetime    # ISO 8601 timestamp, updated on each modification
  title: string           # Short human-readable title describing the patch
  summary: string         # One-sentence summary of the issue or change
  source: object          # Origin metadata — see source sub-fields below
  scope: object           # Target scope — see scope sub-fields below
  change_class: enum[visual, interaction, semantic]  # ADR-049 3-tier classification

  # ============================================================
  # Optional top-level fields (9 fields)
  # ============================================================

  severity: enum[low, medium, high]  # Impact severity, default: none
  conflict: boolean                  # Whether this patch conflicts with another, default: false
  conflict_details: object           # with_patch_id, description
  problem: object                    # user_issue, evidence
  decision: object                   # code_hotfix_allowed, must_backwrite_ssot, backwrite_targets, backwrite_deadline
  implementation: object             # code_changed, changed_files
  test_impact: object                # see test_impact sub-fields below
  related_ids: array[string]         # References to related patch IDs
  resolution: object                 # see resolution sub-fields below
  reviewed_at: datetime              # ISO 8601, when test_impact was human-reviewed (D-21)

  # ============================================================
  # source sub-fields (required object)
  # ============================================================
  source:
    from: string          # fixed: "product_experience"
    actor: enum[human, ai_suggested]
    session: string       # Session identifier where this patch originated
    prompt_ref: string    # Reference to the prompt or turn that produced this patch
    ai_suggested_class: enum[visual, interaction, semantic]  # optional — AI's suggested classification
    human_confirmed_class: enum[visual, interaction, semantic]  # required — human-confirmed classification
    reviewed_at: datetime              # optional — ISO 8601, human review timestamp (D-21)

  # ============================================================
  # scope sub-fields (required object)
  # ============================================================
  scope:
    feat_ref: string      # Feature reference, e.g., "feat.training-plan"
    ui_ref: string        # optional — UI component reference path
    tech_ref: string      # optional — Technical source file reference
    page: string          # Page or route name
    module: string        # Module or subsystem name

  # ============================================================
  # conflict_details sub-fields (optional object)
  # ============================================================
  conflict_details:
    with_patch_id: string  # ID of the conflicting patch
    description: string    # Description of the conflict

  # ============================================================
  # problem sub-fields (optional object)
  # ============================================================
  problem:
    user_issue: string     # Description of the user-facing issue
    evidence: string       # Evidence supporting the issue claim

  # ============================================================
  # decision sub-fields (optional object)
  # ============================================================
  decision:
    code_hotfix_allowed: boolean     # Whether a direct code hotfix is permitted
    must_backwrite_ssot: boolean     # Whether SSOT backwrite is required
    backwrite_targets: array[string] # Target paths for backwrite
    backwrite_deadline: datetime     # Deadline for backwrite completion

  # ============================================================
  # implementation sub-fields (optional object)
  # ============================================================
  implementation:
    code_changed: boolean            # Whether code was changed
    changed_files: array[string]     # List of changed file paths

  # ============================================================
  # test_impact sub-fields (optional object)
  # ============================================================
  test_impact:
    impacts_user_path: boolean           # Whether this affects critical user paths
    impacts_acceptance: boolean          # Whether acceptance criteria are affected
    impacts_existing_testcases: boolean  # Whether existing test cases need updates
    affected_routes: array[string]       # Routes impacted by this patch
    test_targets: array[string]          # Specific test targets to update

  # ============================================================
  # resolution sub-fields (optional object)
  # ============================================================
  resolution:
    backwrite_status: enum[pending, backwritten, discarded, upgraded_to_src, superseded]
    merged_into_ssot_at: datetime | null   # When merged into SSOT, if applicable
    src_created: string | null             # SRC ID if upgraded to source
    closed_at: datetime | null             # When this patch was closed
