# ADR-047 QA Schema: Evidence Record
# Source: ADR-047 §6.3
# Scope: defines the test evidence contract for a single test case execution
# Must NOT contain: execution logic, test script content, decision rationale

evidence_record:
  case_id: string           # unique case ID matching spec
  coverage_id: string       # links to manifest coverage_id
  executed_at: string       # ISO 8601 timestamp
  run_id: string            # execution run identifier
  evidence: object          # case-specific evidence (request/response snapshots, screenshots, etc.)
  side_effects: list        # side effect assertions
  execution_status: string  # "success" | "failed" | "error" | "simulated"
