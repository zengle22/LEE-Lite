api_test_spec:
  case_id: api_case.plan.create.invalid-date-range
  coverage_id: api.plan.create.invalid-date-range
  endpoint: POST /api/plans
  capability: create_plan
  preconditions:
    - authenticated_user_exists
  request:
    body:
      start_date: "2026-04-10"
      end_date: "2026-04-09"
  expected:
    status_code: 400
    response_assertions:
      - error_code == "INVALID_DATE_RANGE"
      - message contains "date range"
    side_effect_assertions:
      - no_plan_created_for_user == true
  cleanup: []
  evidence_required:
    - request_snapshot
    - response_snapshot
    - db_assertion_result
