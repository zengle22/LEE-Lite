artifact_type: feat_freeze_package
schema_version: 1.0.0
downstream_workflows:
  - workflow.dev.feat_to_tech
  - workflow.qa.feat_to_testset
required_runtime_artifacts:
  - feat-freeze-bundle.md
  - feat-freeze-bundle.json
  - integration-context.json
  - feat-review-report.json
  - feat-acceptance-report.json
  - feat-defect-list.json
  - feat-freeze-gate.json
  - handoff-to-feat-downstreams.json
  - execution-evidence.json
  - supervision-evidence.json
required_source_refs:
  - "product.src-to-epic::<run_id>"
  - "EPIC-*"
  - "SRC-*"
required_sections:
  - FEAT Bundle Intent
  - EPIC Context
  - Canonical Glossary
  - Boundary Matrix
  - FEAT Inventory
  - Prohibited Inference Rules
  - Acceptance and Review
  - Downstream Handoff
  - Traceability
structural_checks:
  - schema
  - trace
  - feat_refs_presence
  - boundary_matrix_presence
  - downstream_handoff_presence
  - acceptance_checks_presence
semantic_gate:
  required: true
forbidden_content:
  - epic-level restatement without feat boundaries
  - task-level implementation plan
  - UI wireframe detail
  - unstated new requirements
notes:
  - The output must be strong enough for downstream TECH and TESTSET derivation without re-deriving the parent EPIC.
  - The output must materialize an `integration-context.json` seed so downstream `feat-to-tech` can freeze current-system integration facts without guessing package lineage or glossary ownership.
  - Each FEAT must carry structured acceptance checks and remain independently acceptable.
  - Each FEAT must also freeze a product slice: actors, scenario, business flow, deliverables, business timeline, and downstream semantic boundary.
  - Each FEAT must also expose dedicated constraints and explicit overlap boundaries relative to adjacent FEATs.
  - Each FEAT must emit `design_impact_required` plus `candidate_design_surfaces` so embedded surface-map artifacts and downstream design derivations can route correctly.
  - When `design_impact_required=true`, each FEAT must also emit machine-readable `design_surfaces` entries with `owner`, `action`, `scope`, `reason`, and `create_signals` for every `action=create` entry.
  - Each FEAT must expose explicit machine-friendly mapping fields for upstream/downstream FEAT refs, consumed and produced objects, authoritative artifact, and both prose + feat-ref gate/admission dependencies.
  - The bundle must expose a canonical glossary and bundle-level prohibited inference rules so downstream TECH / TESTSET consumers do not invent term semantics.
  - Downstream handoff must carry a compact machine snapshot of glossary, prohibited inference rules, authoritative artifact ownership, feature dependency map, `integration_context_ref`, and whether design ownership resolution is required (`design_gate_required`).
  - Shared non-goals should be stated at bundle level; FEAT-level non-responsibility should focus on adjacent capability boundaries.
  - Traceability and independent-acceptance conventions may live at bundle level instead of consuming FEAT-specific acceptance slots.
