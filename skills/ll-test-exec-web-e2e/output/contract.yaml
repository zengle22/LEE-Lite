artifact_type: test_exec_skill_response
schema_version: 1.0.0
derived_from: test_exec_skill_request
expected_command: skill.test-exec-web-e2e
required_top_level_fields:
  - api_version
  - command
  - request_id
  - result_status
  - status_code
  - exit_code
  - message
  - data
required_data_fields:
  - skill_ref
  - runner_skill_ref
  - candidate_artifact_ref
  - candidate_managed_artifact_ref
  - candidate_receipt_ref
  - candidate_registry_record_ref
  - handoff_ref
  - run_status
  - resolved_ssot_context_ref
  - ui_intent_ref
  - ui_source_context_ref
  - ui_binding_map_ref
  - ui_flow_plan_ref
  - test_case_pack_ref
  - test_case_pack_meta_ref
  - script_pack_ref
  - script_pack_meta_ref
  - raw_runner_output_ref
  - compliance_result_ref
  - case_results_ref
  - results_summary_ref
  - evidence_bundle_ref
  - bug_bundle_ref
  - test_report_ref
  - coverage_summary_ref
  - coverage_details_ref
  - coverage_report_ref
  - output_validation_ref
  - tse_ref
allowed_run_statuses:
  - completed
  - completed_with_failures
  - completed_with_warnings
  - invalid_run
  - failed
structural_checks:
  - response_envelope_complete
  - response_command_matches_skill
  - execution_refs_present
  - candidate_and_handoff_present
semantic_gate:
  required: true
notes:
  - "The response envelope is the formal skill output; response.data carries the governed candidate refs, web-specific UI source refs, execution artifact refs, and summary refs."
  - "`results_summary_ref` is the primary execution summary artifact; it carries traceability and coverage observations for the run."
  - "`coverage_summary_ref`, `coverage_details_ref`, and `coverage_report_ref` are observational artifacts, not gate decisions."
  - A non-failed run may still require external review. Acceptance remains downstream of this skill.
