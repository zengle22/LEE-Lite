artifact_type: test_exec_skill_request
schema_version: 1.0.0
expected_command: skill.test-exec-web-e2e
required_request_fields:
  - api_version
  - command
  - request_id
  - workspace_root
  - actor_ref
  - trace
  - payload
required_payload_fields:
  - test_set_ref
  - test_environment_ref
optional_payload_fields:
  - proposal_ref
  - frontend_code_ref
  - ui_runtime_ref
  - ui_source_spec
required_environment_fields:
  - execution_modality
  - base_url
  - browser
required_environment_values:
  execution_modality: web_e2e
structural_checks:
  - request_envelope_present
  - command_matches_skill
  - payload_fields_present
  - ui_source_spec_is_object_when_present
semantic_gate:
  required: true
forbidden_inputs:
  - raw_requirement
  - unfrozen_test_case_pack
  - ad_hoc_dom_notes_without_testset
notes:
  - test_set_ref must resolve to a formal TESTSET, usually emitted by ll-qa-feat-to-testset.
  - frontend_code_ref and ui_runtime_ref are optional enrichment sources, not replacements for test_set_ref.
