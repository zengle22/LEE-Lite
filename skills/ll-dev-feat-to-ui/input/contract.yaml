artifact_type: feat_freeze_package
schema_version: 1.0.0
authoritative_upstream_skill: ll-product-epic-to-feat
accepted_statuses:
  - accepted
  - frozen
required_runtime_artifacts:
  - package-manifest.json
  - feat-freeze-bundle.md
  - feat-freeze-bundle.json
  - feat-review-report.json
  - feat-acceptance-report.json
  - feat-defect-list.json
  - feat-freeze-gate.json
  - handoff-to-feat-downstreams.json
  - execution-evidence.json
  - supervision-evidence.json
required_bundle_fields:
  - artifact_type
  - workflow_key
  - workflow_run_id
  - status
  - feat_refs
  - features
  - source_refs
required_feature_fields:
  - feat_ref
  - title
  - goal
  - scope
  - constraints
  - acceptance_checks
  - source_refs
required_selector_fields:
  - feat_ref
structural_checks:
  - required_artifact_presence
  - upstream_workflow_is_product.epic-to-feat
  - feat_freeze_gate_is_pass
  - selected_feat_ref_present
semantic_gate:
  required: true
forbidden_inputs:
  - raw_requirement
  - src_candidate_package
  - epic_freeze_package
  - direct_ui_mock
notes:
  - This workflow is deprecated under ADR-040 and ADR-042 and must only return a deprecation response with replacement guidance.
  - Replacement path is feat_to_surface_map -> feat_to_proto -> human-reviewed prototype freeze -> proto_to_ui.
  - Direct FEAT-to-UI derivation is blocked because UI is treated as a shared design asset, not a FEAT-private output.
  - UI hints such as ui_units, ui_input_fields, ui_display_fields, ui_api_touchpoints, or platform are optional enrichments.
  - Optional UI hints may refine the UI Spec, but they must not override FEAT scope, goal, constraints, or acceptance boundary.
  - If a FEAT explicitly carries ui_required=false, this workflow must reject the input instead of forcing a UI Spec.
