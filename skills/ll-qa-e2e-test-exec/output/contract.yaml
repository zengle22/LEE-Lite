# Output Contract: ll-qa-e2e-test-exec

## Required Output
```yaml
output:
  evidence_dir: string     # path to evidence output directory
  manifest_updated: boolean
  run_id: string
  results:
    - coverage_id: string
      status: "passed" | "failed" | "error"
      evidence_path: string
```

## Output Schema
Each execution run produces:
- Evidence YAML files at `{evidence_dir}/{run_id}/{coverage_id}.evidence.yaml`
- Playwright JSON report at `{evidence_dir}/playwright-report.json`
- Manifest with updated lifecycle_status, evidence_status, evidence_refs

## Evidence Format
Evidence files follow ADR-047 Section 6.3:
```yaml
evidence_record:
  case_id: string
  coverage_id: string
  executed_at: string       # ISO timestamp
  run_id: string            # unique run identifier
  evidence:
    browser_trace: string   # path to trace.zip
    screenshot_final: string # path to final.png
    network_log: string     # path to network.json
    dom_assertions: [...]
    persistence_assertion: [...]
    console_errors: []
  side_effects: []
  execution_status: "success" | "failed" | "error"
```

## Quality Checks
- [ ] Evidence directory exists with evidence YAML files
- [ ] Each evidence file passes `qa_schemas --type evidence` validation
- [ ] Each evidence file contains all items from spec.evidence_required
- [ ] Manifest updated atomically with correct lifecycle_status
- [ ] Manifest evidence_status set to "complete" for executed cases
- [ ] Manifest evidence_refs contains paths to evidence files
