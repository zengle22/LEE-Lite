# Output Contract: ll-patch-capture

## Required Output
- Patch YAML file at ssot/experience-patches/{FEAT-ID}/UXPATCH-NNNN__{slug}.yaml
- Updated patch_registry.json at ssot/experience-patches/{FEAT-ID}/patch_registry.json

## Output Schema
Each Patch YAML file conforms to ssot/schemas/qa/patch.yaml with:
- Root key: experience_patch
- id: UXPATCH-NNNN format (4-digit zero-padded)
- type: "experience_patch"
- status: "active" (default for new registrations)
- change_class: one of visual, interaction, semantic
- source.actor: "ai_suggested" with source.human_confirmed_class set
- scope.feat_ref: matches the input feat_id
- All required source sub-fields populated (from, actor, session, prompt_ref, human_confirmed_class)
- All required scope sub-fields populated (feat_ref, page, module)

patch_registry.json contains:
- patch_registry_version: "1.0.0"
- feat_id: matches the FEAT directory name
- patches: array with new entry appended (id, status, change_class, created_at, title, patch_file)
- last_updated: ISO 8601 timestamp
