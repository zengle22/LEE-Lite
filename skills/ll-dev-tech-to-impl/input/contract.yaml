artifact_type: tech_design_package
schema_version: 1.0.0
authoritative_upstream_skill: ll-dev-feat-to-tech
accepted_statuses:
  - accepted
  - frozen
required_runtime_artifacts:
  - package-manifest.json
  - tech-design-bundle.md
  - tech-design-bundle.json
  - tech-spec.md
  - integration-context.json
  - tech-review-report.json
  - tech-acceptance-report.json
  - tech-defect-list.json
  - tech-freeze-gate.json
  - handoff-to-tech-impl.json
  - execution-evidence.json
  - supervision-evidence.json
required_fields:
  - artifact_type
  - workflow_key
  - workflow_run_id
  - status
  - schema_version
  - feat_ref
  - tech_ref
  - selected_feat
  - need_assessment
  - integration_sufficiency_check
  - downstream_handoff
  - source_refs
required_selected_feat_fields:
  - feat_ref
  - title
  - goal
  - scope
  - constraints
required_selector_fields:
  - feat_ref
  - tech_ref
structural_checks:
  - required_artifact_presence
  - upstream_workflow_is_dev.feat-to-tech
  - tech_freeze_gate_is_pass
  - selected_feat_ref_present
  - selected_tech_ref_present
  - downstream_handoff_complete
  - upstream_feat_lineage_present
  - evidence_presence
semantic_gate:
  required: true
controlled_exceptions:
  provisional_inputs_allowed: true
  required_markers:
    - provisional_ref
    - impact_scope
    - follow_up_action
  rules:
    - provisional inputs must stay explicitly marked and must not be treated as final truth
    - repo context is execution context only and must not silently override upstream truth
    - upstream ref changes must trigger freshness review or re-derive before reuse
forbidden_statuses:
  - revised
  - rejected
forbidden_inputs:
  - raw_requirement
  - feat_freeze_package
  - direct_task_list
  - shadow_tech_doc
notes:
  - The selected TECH package must already be independently acceptable at the TECH layer before implementation planning begins.
  - `feat_ref` and `tech_ref` selection are both mandatory because IMPL now derives from frozen TECH authority, not raw FEAT notes.
  - When `selected_feat.design_impact_required` is true, the TECH package must also carry a `surface_map_ref` so IMPL can bind to the shared design ownership layer.
  - `surface_map_ref` is a gate and authority clue, not a new design source; it only records which shared surface-map package this TECH package was derived from.
  - `downstream_handoff` must preserve the frozen integration_context, canonical ownership, state machine, NFR, migration, and algorithm refs needed for IMPL planning.
  - IMPL must consume those refs directly and must not reinterpret them as a second design pass.
  - Provisional upstream inputs are allowed only through an explicit exception path with follow-up freeze or revision handling.

