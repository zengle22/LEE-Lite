artifact_type: feature_impl_candidate_package
schema_version: 1.0.0
required_runtime_artifacts:
  - package-manifest.json
  - impl-bundle.md
  - impl-bundle.json
  - impl-task.md
  - upstream-design-refs.json
  - integration-plan.md
  - dev-evidence-plan.json
  - smoke-gate-subject.json
  - impl-review-report.json
  - document-test-report.json
  - impl-acceptance-report.json
  - impl-defect-list.json
  - handoff-to-feature-delivery.json
  - execution-evidence.json
  - supervision-evidence.json
required_source_refs:
  - "dev.feat-to-tech::<run_id>"
  - "FEAT-*"
  - "TECH-*"
  - "EPIC-*"
  - "SRC-*"
required_output_objects:
  - IMPL_TASK
  - UPSTREAM_DESIGN_REFS
required_bundle_sections:
  - Selected Upstream
  - Package Semantics
  - Applicability Assessment
  - Implementation Task
  - Integration Plan
  - Evidence Plan
  - Smoke Gate Subject
  - Delivery Handoff
  - Traceability
required_impl_task_sections:
  - 1. 任务标识
  - 2. 本次目标
  - 3. 范围与非目标
  - 4. 上游收敛结果
  - 5. 规范性约束
  - 6. 实施要求
  - 7. 交付物要求
  - 8. 验收标准与 TESTSET 映射
  - 9. 执行顺序建议
  - 10. 风险与注意事项
conditional_output_objects:
  - FRONTEND_WORKSTREAM
  - BACKEND_WORKSTREAM
  - MIGRATION_CUTOVER_PLAN
required_machine_fields:
  - package_semantics
  - authority_scope
  - selected_upstream_refs
  - authority_binding_status
  - authority_gap_register
  - provisional_refs
  - scope_boundary
  - upstream_impacts
  - normative_items
  - informative_items
  - repo_touch_points
  - embedded_execution_contract
  - change_controls
  - required_steps
  - suggested_steps
  - implementation_task_breakdown
  - acceptance_trace
  - acceptance_to_task_mapping
  - testset_mapping
  - handoff_artifacts
  - conflict_policy
  - freshness_status
  - rederive_triggers
  - self_contained_policy
  - repo_discrepancy_status
structural_checks:
  - schema
  - trace
  - mandatory_artifact_presence
  - applicability_assessment_consistency
  - status_model_consistency
  - downstream_handoff_presence
  - contract_projection_presence
semantic_gate:
  required: true
forbidden_content:
  - second_layer_technical_design
  - release_plan_truth
  - qa_strategy_truth
  - unstated_new_requirements
  - code_completion_claim_without_execution
  - ssot_phrasing_misuse
  - upstream_full_copy
  - repo_as_truth_fallback
notes:
  - `impl-task.md`, `upstream-design-refs.json`, `integration-plan.md`, `dev-evidence-plan.json`, and `smoke-gate-subject.json` are mandatory in every run.
  - Frontend, backend, and migration workstreams are conditional and must follow explicit applicability assessment.
  - The package is the canonical execution package and execution-time single entrypoint for `template.dev.feature_delivery_l2`, not final code-delivery proof.
  - `impl-task.md` must be independently actionable as a full execution contract, not just a brief that depends on sidecar files to recover scope, test mapping, or change controls.
  - `impl-bundle.md` / published IMPL markdown must expose the same execution-critical facts needed for a reader to understand touch set, task order, embedded contracts, and acceptance mapping without reopening upstream refs.
  - When the upstream TECH package was derived from a `design_impact_required` FEAT, the candidate package must carry `surface_map_ref` through `selected_upstream_refs` and `upstream_design_refs` so the implementation authority chain remains explicit.
  - `surface_map_ref` is an authority clue only; it does not replace TECH, ARCH, API, UI, or TESTSET authority.

