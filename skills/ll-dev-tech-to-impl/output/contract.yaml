artifact_type: feature_impl_candidate_package
schema_version: 1.0.0
required_runtime_artifacts:
  - package-manifest.json
  - impl-bundle.md
  - impl-bundle.json
  - impl-task.md
  - upstream-design-refs.json
  - integration-plan.md
  - dev-evidence-plan.json
  - smoke-gate-subject.json
  - impl-review-report.json
  - document-test-report.json
  - impl-acceptance-report.json
  - impl-defect-list.json
  - handoff-to-feature-delivery.json
  - execution-evidence.json
  - supervision-evidence.json
required_source_refs:
  - "dev.feat-to-tech::<run_id>"
  - "FEAT-*"
  - "TECH-*"
  - "EPIC-*"
  - "SRC-*"
required_output_objects:
  - IMPL_TASK
  - UPSTREAM_DESIGN_REFS
required_bundle_sections:
  - Selected Upstream
  - Package Semantics
  - Applicability Assessment
  - Implementation Task
  - Integration Plan
  - Evidence Plan
  - Smoke Gate Subject
  - Delivery Handoff
  - Traceability
required_impl_task_sections:
  - 1. 目标
  - 2. 上游依赖
  - 3. 实施范围
  - 4. 实施步骤
  - 5. 风险与阻塞
  - 6. 交付物
  - 7. 验收检查点
conditional_output_objects:
  - FRONTEND_WORKSTREAM
  - BACKEND_WORKSTREAM
  - MIGRATION_CUTOVER_PLAN
required_machine_fields:
  - package_semantics
  - authority_scope
  - selected_upstream_refs
  - provisional_refs
  - normative_items
  - informative_items
  - required_steps
  - suggested_steps
  - acceptance_trace
  - handoff_artifacts
  - conflict_policy
  - freshness_status
  - rederive_triggers
  - self_contained_policy
  - repo_discrepancy_status
structural_checks:
  - schema
  - trace
  - mandatory_artifact_presence
  - applicability_assessment_consistency
  - status_model_consistency
  - downstream_handoff_presence
  - contract_projection_presence
semantic_gate:
  required: true
forbidden_content:
  - second_layer_technical_design
  - release_plan_truth
  - qa_strategy_truth
  - unstated_new_requirements
  - code_completion_claim_without_execution
  - ssot_phrasing_misuse
  - upstream_full_copy
  - repo_as_truth_fallback
notes:
  - `impl-task.md`, `upstream-design-refs.json`, `integration-plan.md`, `dev-evidence-plan.json`, and `smoke-gate-subject.json` are mandatory in every run.
  - Frontend, backend, and migration workstreams are conditional and must follow explicit applicability assessment.
  - The package is the canonical execution package and execution-time single entrypoint for `template.dev.feature_delivery_l2`, not final code-delivery proof.

