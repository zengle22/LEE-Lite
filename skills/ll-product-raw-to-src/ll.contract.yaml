skill_id: ll-product-raw-to-src
skill_type: workflow
version: 0.6.0
workflow_key: product.raw-to-src

roles:
  executor:
    required: true
    evidence_required: true
    prompt_file: agents/executor.md
  supervisor:
    required: true
    evidence_required: true
    prompt_file: agents/supervisor.md

runtime:
  mode: lite_native
  command: python scripts/raw_to_src.py run --input <path>
  entry_script: scripts/raw_to_src.py
  executor_command: python scripts/raw_to_src.py executor-run --input <path>
  supervisor_command: python scripts/raw_to_src.py supervisor-review --artifacts-dir <artifacts-dir>
  artifact_directory: artifacts/raw-to-src
  primary_artifact_name: src-candidate.md
  single_output_per_run: true
  external_gate_required: true

input:
  artifact_type: raw-input
  contract_file: input/contract.yaml
  schema_file: input/schema.json
  structural_validation_required: true
  semantic_validation_required: true

output:
  artifact_type: src_candidate_package
  contract_file: output/contract.yaml
  schema_file: output/schema.json
  template_file: output/template.md
  structural_validation_required: true
  semantic_validation_required: true
  required_runtime_artifacts:
    - package-manifest.json
    - src-candidate.md
    - src-candidate.json
    - frz-package/index.md
    - frz-package/freeze.yaml
    - frz-package/evidence.yaml
    - frz-package/frz-package.json
    - structural-report.json
    - source-semantic-findings.json
    - document-test-report.json
    - acceptance-report.json
    - patch-lineage.json
    - run-state.json
    - result-summary.json
    - proposed-next-actions.json
    - job-proposal.json
    - retry-budget-report.json
    - execution-evidence.json
    - supervision-evidence.json

validation:
  structural:
    - "python scripts/raw_to_src.py validate-input --input $INPUT"
    - "python scripts/raw_to_src.py validate-output --artifacts-dir $ARTIFACTS"
    - "python scripts/raw_to_src.py validate-package-readiness --artifacts-dir $ARTIFACTS"
  semantic:
    input_checklist: input/semantic-checklist.md
    output_checklist: output/semantic-checklist.md
  document_test:
    report_artifact: document-test-report.json
    state: document_tested
    repair_profile: full_document_test_plus_local_repair_friendly
    required_top_level_fields:
      - workflow_key
      - run_id
      - tested_at
      - test_outcome
      - defect_counts
      - recommended_next_action
      - recommended_actor
      - sections
    test_outcome_enum:
      - no_blocking_defect_found
      - blocking_defect_found
      - inconclusive
      - not_applicable
    required_sections:
      - structural
      - logic_consistency
      - downstream_readiness
      - semantic_drift
      - fixability
    fixability_classes:
      - mechanical_fixable
      - local_semantic_fixable
      - rebuild_required
      - human_judgement_required
    recommended_actor_enum:
      - executor_local_patch
      - workflow_rebuild
      - supervisor_handoff
      - external_gate_review
      - human_owner_decision
    escalation_rules:
      - main_structure_boundary_state_model_or_acceptance_change_requires_rebuild
      - cross_document_consistency_or_handoff_contract_change_defaults_to_rebuild
      - product_goal_priority_strategy_or_org_dependency_conflict_requires_human_judgement
      - authority_or_revision_conflict_requires_human_judgement
      - only_low_risk_field_ref_manifest_evidence_repairs_remain_mechanical
    downstream_consumption_contract:
      target_workflow: product.src-to-epic
      checks:
        - problem_statement_closed
        - key_constraints_and_scope_support_epic_derivation
        - semantic_inventory_and_provenance_complete
        - revision_context_and_source_refs_traceable

review_phase1:
  artifact_family: src_or_feat
  risk_profiles:
    - default
  coverage_dimensions:
    - ssot_alignment
    - object_completeness
    - contract_completeness
    - state_transition_closure
    - failure_path
    - testability
  required_checks:
    - ssot_alignment
    - object_completeness
    - contract_completeness
    - state_transition_closure
    - failure_path
    - testability
  gate_block_conditions:
    - missing_coverage
    - required_check_not_checked
    - blocker_count_gt_zero

evidence:
  execution_schema: evidence/execution-evidence.schema.json
  supervision_schema: evidence/supervision-evidence.schema.json
  report_template: evidence/report.template.md

lifecycle:
  definition_file: ll.lifecycle.yaml
  max_revision_rounds: 3
  state_semantics:
    document_tested:
      evidence_complete: true
      implies_ready: false
      implies_approved: false
      implies_frozen: false
    supervisor_reviewed:
      evidence_submission_review_complete: true
      implies_authoritative_approval: false
    gate_ready:
      external_gate_submission_ready: true
      implies_approved: false
      implies_frozen: false
  budgets:
    structural_fix_budget: 3
    semantic_fix_budget: 2
    total_repair_budget: 4

gate:
  freeze_requires:
    - input_structural_pass
    - input_semantic_pass
    - output_structural_pass
    - output_semantic_pass
    - document_test_report_present
    - execution_evidence_present
    - supervision_evidence_present
  model: external
  readiness_signal: freeze_readiness_assessment
  skill_emits:
    - result-summary.json
    - proposed-next-actions.json
    - handoff-proposal.json
    - job-proposal.json
  gate_materializes:
    - gate-decision.json
    - materialized-handoff.json
    - materialized-job.json
  reject_when:
    - input_already_ssot
    - gate_materialize_placeholder
    - multi_topic_input_detected
    - unresolved_p0_p1_defects
    - duplicate_title_without_update
    - required_evidence_missing
