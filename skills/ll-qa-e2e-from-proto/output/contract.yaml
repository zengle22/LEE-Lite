# Output Contract: ll-qa-e2e-from-proto

## Output Artifacts

1. ssot/tests/e2e/{proto_id}/e2e-journey-plan.md
   - Contains Acceptance Traceability table (acceptance → journey mapping)
   - Per ADR-053 §2.2.2 format

2. ssot/tests/e2e/{proto_id}/e2e-coverage-manifest.yaml
   - Generated by ll-qa-e2e-manifest-init

3. ssot/tests/e2e/{proto_id}/e2e-journey-spec/JOURNEY-*.md
   - Generated by ll-qa-e2e-spec-gen
