artifact_type: feat_freeze_package
schema_version: 1.0.0
authoritative_upstream_skill: ll-product-epic-to-feat
accepted_statuses:
  - accepted
  - frozen
required_runtime_artifacts:
  - package-manifest.json
  - feat-freeze-bundle.md
  - feat-freeze-bundle.json
  - integration-context.json
  - feat-review-report.json
  - feat-acceptance-report.json
  - feat-defect-list.json
  - feat-freeze-gate.json
  - handoff-to-feat-downstreams.json
  - execution-evidence.json
  - supervision-evidence.json
required_bundle_fields:
  - artifact_type
  - workflow_key
  - workflow_run_id
  - status
  - epic_freeze_ref
  - src_root_id
  - feat_refs
  - features
  - source_refs
required_feature_fields:
  - feat_ref
  - title
  - goal
  - scope
  - constraints
  - acceptance_checks
  - source_refs
required_optional_feature_fields:
  - design_impact_required
  - candidate_design_surfaces
  - surface_map_required_reason
conditional_runtime_artifacts:
  when_design_impact_required_true:
    - surface-map-bundle.json
    - surface-map-freeze-gate.json
required_selector_fields:
  - feat_ref
required_integration_context_fields:
  - workflow_inventory
  - module_boundaries
  - legacy_fields_states_interfaces
  - canonical_ownership
  - compatibility_constraints
  - migration_modes
  - legacy_invariants
  - gate_audit_evidence
  - source_refs
structural_checks:
  - required_artifact_presence
  - upstream_workflow_is_product.epic-to-feat
  - feat_freeze_gate_is_pass
  - selected_feat_ref_present
  - evidence_presence
  - integration_context_presence
  - integration_context_structure
  - surface_map_gate_present_when_design_impact_required
semantic_gate:
  required: true
forbidden_statuses:
  - revised
  - rejected
forbidden_inputs:
  - raw_requirement
  - src_candidate_package
  - epic_freeze_package
  - direct_task_list
notes:
  - The selected FEAT must already be independently acceptable at the FEAT layer before design expansion begins.
  - `feat_ref` selection is mandatory because a feat_freeze_package may contain multiple FEATs.
  - `integration_context` is mandatory as a runtime artifact because formal tech design must freeze existing-system integration facts instead of inferring them later.
  - When `design_impact_required=true`, a frozen `surface_map_package` must already exist and must include a `tech` owner binding for the selected FEAT.
