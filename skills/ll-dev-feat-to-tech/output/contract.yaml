artifact_type: tech_design_package
schema_version: 1.0.0
authoritative_upstream_skill: ll-dev-feat-to-tech
accepted_statuses:
  - accepted
  - frozen
required_runtime_artifacts:
  - package-manifest.json
  - tech-design-bundle.md
  - tech-design-bundle.json
  - tech-spec.md
  - integration-context.json
  - tech-review-report.json
  - tech-acceptance-report.json
  - tech-defect-list.json
  - tech-freeze-gate.json
  - handoff-to-tech-impl.json
  - execution-evidence.json
  - supervision-evidence.json
required_fields:
  - artifact_type
  - workflow_key
  - workflow_run_id
  - status
  - schema_version
  - feat_ref
  - tech_ref
  - surface_map_ref
  - selected_feat
  - source_refs
  - need_assessment
  - integration_sufficiency_check
  - downstream_handoff
  - owner_binding_status
required_selected_feat_fields:
  - feat_ref
  - title
  - goal
  - scope
  - constraints
required_optional_selected_feat_fields:
  - design_impact_required
  - surface_map_ref
  - tech_owner_ref
  - tech_action
required_selector_fields:
  - feat_ref
  - tech_ref
  - integration_context
required_tech_sections:
  - implementation_carrier_view
  - state_machine
  - module_plan
  - algorithm_constraints
  - implementation_unit_mapping
  - interface_contracts
  - main_sequence
  - exception_and_compensation
  - integration_points
  - minimal_code_skeleton
  - io_matrix_and_side_effects
  - technical_glossary_and_canonical_ownership
  - migration_constraints
structural_checks:
  - required_artifact_presence
  - upstream_workflow_is_dev.feat-to-tech
  - tech_freeze_gate_is_pass
  - selected_feat_ref_present
  - selected_tech_ref_present
  - upstream_feat_lineage_present
  - surface_map_trace_present_when_design_impact_required
  - evidence_presence
  - integration_sufficiency_presence
  - downstream_handoff_presence
semantic_gate:
  required: true
controlled_exceptions:
  provisional_inputs_allowed: true
  required_markers:
    - provisional_ref
    - impact_scope
    - follow_up_action
  rules:
    - provisional inputs must stay explicitly marked and must not be treated as final truth
    - repo context is execution context only and must not silently override upstream truth
    - upstream ref changes must trigger freshness review or re-derive before reuse
forbidden_statuses:
  - revised
  - rejected
forbidden_inputs:
  - raw_requirement
  - feat_freeze_package
  - direct_task_list
  - shadow_tech_doc
notes:
  - The selected TECH package must already be independently acceptable at the TECH layer before implementation planning begins.
  - `feat_ref` and `tech_ref` selection are both mandatory because IMPL derives from frozen TECH authority, not raw FEAT notes.
  - `integration_context` is mandatory because formal TECH design must freeze existing-system integration facts, canonical ownership, and migration constraints.
  - `surface_map_ref` is required when the selected FEAT carries `design_impact_required=true`, and it must trace the shared design ownership binding used for TECH derivation.
  - The 10-block TECH structure is represented by the runtime headings in `tech-design-bundle.md`; the contract names are the SSOT for semantic review.
