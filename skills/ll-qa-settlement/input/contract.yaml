# Input Contract: ll-qa-settlement

## Required Input
- Updated api-coverage-manifest.yaml (post-execution)
- Updated e2e-coverage-manifest.yaml (post-execution)

## Input Validation
- [ ] Both manifests exist and are valid YAML
- [ ] Items have updated lifecycle_status and evidence_status
- [ ] Executed items have non-empty evidence_refs

---

# Output Contract: ll-qa-settlement

## Required Output
- ssot/tests/.artifacts/settlement/api-settlement-report.yaml
- ssot/tests/.artifacts/settlement/e2e-settlement-report.yaml

## Output Schema
Each report contains:
- Root key (api_settlement / e2e_settlement)
- Metadata (feature_id or prototype_id, generated_at)
- Statistics (total, designed, executed, passed, failed, blocked, uncovered, cut, obsolete, pass_rate)
- gap_list (coverage_id, capability, lifecycle_status, reason)
- waiver_list (coverage_id, waiver_status, waiver_reason)
- E2E report additionally has exception_journeys subsection
