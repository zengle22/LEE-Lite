artifact_type: test_exec_skill_request
schema_version: 1.0.0
expected_command: skill.test-exec-cli
required_request_fields:
  - api_version
  - command
  - request_id
  - workspace_root
  - actor_ref
  - trace
  - payload
required_payload_fields:
  - test_set_ref
  - test_environment_ref
optional_payload_fields:
  - proposal_ref
  - qualification_budget
optional_environment_fields:
  - coverage_mode
  - coverage_enabled
  - coverage_scope_name
  - coverage_include
  - coverage_source
  - coverage_omit
required_environment_fields:
  - execution_modality
required_environment_values:
  execution_modality: cli
required_environment_any_of:
  - command_entry
  - runner_command
structural_checks:
  - request_envelope_present
  - command_matches_skill
  - payload_fields_present
semantic_gate:
  required: true
forbidden_inputs:
  - raw_requirement
  - unfrozen_test_case_pack
  - ad_hoc_shell_script_without_testset
notes:
  - test_set_ref must resolve to a formal TESTSET, usually emitted by ll-qa-feat-to-testset.
  - The CLI environment must expose a real executable entry instead of an informal note.
  - coverage_mode, when present, should distinguish smoke_acceptance from coverage_qualification. Smoke/acceptance runs may disable coverage; qualification runs should collect coverage only as an auxiliary signal.
  - coverage_enabled may be set to true only for compatible script or module command_entry values. Avoid python -c for coverage-enabled paths.
  - When coverage_include is omitted, the skill may automatically adopt feature_owned_code_paths emitted by the TESTSET for coverage qualification runs only; smoke runs should not auto-enable coverage.
  - TESTSET remains a strategy-level object. The main path is requirement-driven case expansion over `functional_areas`, `logic_dimensions`, `state_model`, and `coverage_matrix`. Qualification runs may still expand runnable cases in `TestCasePack`, but they must not require the source TESTSET to pre-enumerate all branches.
  - Case expansion should start from the minimal `test_units` projection and may use strategy hints such as `coverage_goal`, `branch_families`, `expansion_hints`, and `qualification_expectation` when present.
  - If request payload meaning changes, the caller must use a new request_id. Reusing a request_id with different payload content is a hard failure, not a replay.
