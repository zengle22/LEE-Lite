artifact_type: test_exec_skill_response
schema_version: 1.0.0
derived_from: test_exec_skill_request
expected_command: skill.test-exec-cli
required_top_level_fields:
  - api_version
  - command
  - request_id
  - result_status
  - status_code
  - exit_code
  - message
  - data
required_data_fields:
  - skill_ref
  - runner_skill_ref
  - candidate_artifact_ref
  - candidate_managed_artifact_ref
  - candidate_receipt_ref
  - candidate_registry_record_ref
  - handoff_ref
  - run_status
  - resolved_ssot_context_ref
  - ui_intent_ref
  - ui_source_context_ref
  - ui_binding_map_ref
  - ui_flow_plan_ref
      - test_case_pack_ref
      - script_pack_ref
      - evidence_bundle_ref
      - test_report_ref
      - projection_mode
      - generation_mode
      - expansion_round
      - qualification_budget
      - expansion_stop_reason
      - qualification_lineage
      - coverage_summary_ref
      - coverage_report_ref
      - output_validation_ref
      - tse_ref
allowed_run_statuses:
  - completed
  - completed_with_failures
  - completed_with_warnings
  - invalid_run
  - failed
structural_checks:
  - response_envelope_complete
  - response_command_matches_skill
  - execution_refs_present
  - candidate_and_handoff_present
semantic_gate:
  required: true
notes:
  - The response envelope is the formal skill output; response.data carries the governed candidate and execution artifact refs.
  - A non-failed run may still require external review. Acceptance remains downstream of this skill.
  - coverage_summary_ref and coverage_report_ref must be present; when coverage is not enabled, they should still resolve to disabled-status artifacts.
  - Smoke/acceptance runs may legitimately report disabled coverage, but coverage qualification runs must produce measurable coverage artifacts suitable for gate evaluation.
  - `test_case_pack_ref` may refer to a minimal projection pack or to a qualification-expanded pack revision; either way, the source `TESTSET` remains the strategy authority.
  - The main runtime surface is requirement-driven case expansion. `functional_areas`, `logic_dimensions`, `state_model`, and `coverage_matrix` are the contract boundary for traceable expansion.
