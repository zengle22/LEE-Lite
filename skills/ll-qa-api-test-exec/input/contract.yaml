# Input Contract: ll-qa-api-test-exec

## Required Input
```yaml
input:
  spec_path: string      # path to api-test-spec YAML (for evidence_required validation)
  test_dir: string       # directory containing generated pytest .py files
  manifest_path: string  # path to api-coverage-manifest.yaml
  output_dir: string     # evidence output directory (optional)
  base_url: string       # API base URL for test execution (optional)
```

## Input Validation
- [ ] Spec YAML file exists and passes `qa_schemas --type spec` validation
- [ ] test_dir exists and contains at least one .py test file
- [ ] manifest_path exists and passes `qa_schemas --type manifest` validation
- [ ] output_dir is writable (will be created if not exists)
