# Input Contract: ll-qa-e2e-spec-gen

## Required Input
- e2e-coverage-manifest.yaml from ll-qa-e2e-manifest-init

## Input Validation
- [ ] e2e-coverage-manifest.yaml exists and is valid YAML
- [ ] Root key is e2e_coverage_manifest
- [ ] Items array is non-empty
- [ ] Items have lifecycle_status field

---

# Output Contract: ll-qa-e2e-spec-gen

## Required Output
- Multiple spec files at ssot/tests/e2e/{prototype_id}/e2e-journey-spec/

## Output Schema
Each spec file contains:
- Spec metadata (spec_id, coverage_id_ref, journey_id_ref, journey_type, priority)
- entry_point (page/URL, initial state)
- user_steps (ordered list with UI feedback)
- expected_ui_states (UI state assertions at checkpoints)
- expected_network_events (API calls expected)
- expected_persistence (data saved/changed)
- evidence_required (playwright_trace, screenshot, network_log, console_log, storage_state)
- anti_false_pass_checks
- source_refs

## Quality Checks
- [ ] One spec per non-cut coverage item
- [ ] Every spec has evidence_required with playwright_trace + screenshot
- [ ] Every spec has anti_false_pass_checks (P0: at least 3)
- [ ] All user steps traceable to prototype/FEAT
- [ ] Exception journey specs include error condition and recovery path
