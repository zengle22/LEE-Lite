# Output Contract: ll-qa-api-from-feat

## Output Artifacts

1. ssot/tests/api/{feat_id}/api-test-plan.md
   - Contains Acceptance Traceability table (acceptance → capability mapping)
   - Per ADR-053 §2.2.1 format

2. ssot/tests/api/{feat_id}/api-coverage-manifest.yaml
   - Generated by ll-qa-api-manifest-init

3. ssot/tests/api/{feat_id}/api-test-spec/SPEC-*.md
   - Generated by ll-qa-api-spec-gen
