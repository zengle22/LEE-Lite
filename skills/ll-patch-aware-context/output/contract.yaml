# Output Contract: ll-patch-aware-context

output_contract:
  skill: ll-patch-aware-context
  artifacts:
    - name: patch-awareness.yaml
      format: yaml
      description: "Patch awareness recording for SSOT chain executor"
      schema:
        top_level_key: patch_awareness
        fields:
          - name: feat_ref
            type: string
            required: true
          - name: scan_timestamp
            type: string
            required: true
            description: "ISO 8601 timestamp"
          - name: has_active_patches
            type: boolean
            required: true
          - name: patch_scan_status
            type: string
            required: true
            enum: ["patches_found", "none_found"]
          - name: validated_patches_summary
            type: array
            required: false
          - name: pending_patches_summary
            type: array
            required: false
          - name: conflict_resolution
            type: object
            required: false
          - name: directory_hash
            type: string
            required: true
          - name: ai_consideration
            type: string
            required: true
            description: "AI's reasoning for patch consideration or divergence"
