artifact_type: ui_spec_package
schema_version: 1.0.0
authoritative_upstream_skill: ll-dev-proto-to-ui
accepted_statuses:
  - accepted
  - frozen
required_runtime_artifacts:
  - package-manifest.json
  - ui-spec-bundle.md
  - ui-spec-bundle.json
  - ui-flow-map.md
  - ui-semantic-source-ledger.json
  - ui-spec-completeness-report.json
  - ui-spec-review-report.json
  - document-test-report.json
  - ui-spec-defect-list.json
  - ui-spec-freeze-gate.json
  - execution-evidence.json
  - supervision-evidence.json
required_fields:
  - artifact_type
  - workflow_key
  - feat_ref
  - ui_ref
  - ui_owner_ref
  - ui_action
  - ui_spec_refs
  - journey_structural_spec_ref
  - ui_shell_snapshot_ref
  - surface_map_ref
required_optional_fields:
  - related_feat_refs
  - prototype_owner_ref
  - prototype_action
structural_checks:
  - required_artifact_presence
  - workflow_is_dev.proto-to-ui
  - semantic_ledger_present
  - surface_map_trace_present
  - ui_owner_binding_present
  - evidence_presence
semantic_gate:
  required: true
notes:
  - `ui_ref` remains as a compatibility field but must equal the resolved `ui_owner_ref`.
  - UI output is an update/create candidate on a shared UI owner, not a FEAT-scoped private artifact.
