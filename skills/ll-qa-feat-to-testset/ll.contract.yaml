skill_id: ll-qa-feat-to-testset
skill_type: workflow
version: 0.2.0
workflow_key: qa.feat-to-testset

authority:
  canonical_template: E:\ai\LEE\spec-global\departments\qa\workflows\templates\test-set-production-l3-template.md
  upstream_skill: ll-product-epic-to-feat
  downstream_skill: skill.qa.test_exec_web_e2e
  template_workflow_key: workflow.qa.test_set_production_l3
  template_id: template.qa.test_set_production

roles:
  executor:
    required: true
    evidence_required: true
    prompt_file: agents/executor.md
  supervisor:
    required: true
    evidence_required: true
    prompt_file: agents/supervisor.md

runtime:
  mode: lite_native
  command: python scripts/feat_to_testset.py run --input <feat-package-dir> --feat-ref <feat-ref> --repo-root <repo-root>
  entry_script: scripts/feat_to_testset.py
  accepted_input_paths:
    - artifacts/epic-to-feat/<run_id>
    - direct feat_freeze_package directory path
  produced_output_dir: artifacts/feat-to-testset/<run_id>--<feat_ref>
  required_output_artifacts:
    - package-manifest.json
    - test-set-bundle.md
    - test-set-bundle.json
    - test-set.yaml
    - analysis.md
    - strategy-draft.yaml
    - test-set-review-report.json
    - document-test-report.json
    - test-set-acceptance-report.json
    - test-set-defect-list.json
    - test-set-freeze-gate.json
    - gate-subject-index.json
    - analysis-review-subject.json
    - strategy-review-subject.json
    - test-set-approval-subject.json
    - handoff-to-test-execution.json
    - execution-evidence.json
    - supervision-evidence.json

input:
  artifact_type: feat_freeze_package
  contract_file: input/contract.yaml
  schema_file: input/schema.json
  structural_validation_required: true
  semantic_validation_required: true

output:
  artifact_type: test_set_candidate_package
  contract_file: output/contract.yaml
  schema_file: output/schema.json
  template_file: output/template.md
  structural_validation_required: true
  semantic_validation_required: true

validation:
  structural:
    - "python scripts/feat_to_testset.py validate-input --input $INPUT --feat-ref $FEAT_REF"
    - "python scripts/feat_to_testset.py run --input $INPUT --feat-ref $FEAT_REF --repo-root $REPO_ROOT --allow-update"
    - "python scripts/feat_to_testset.py validate-output --artifacts-dir $OUTPUT"
    - "python scripts/feat_to_testset.py validate-package-readiness --artifacts-dir $OUTPUT"
    - "python scripts/feat_to_testset.py freeze-guard --artifacts-dir $OUTPUT"
  semantic:
    input_checklist: input/semantic-checklist.md
    output_checklist: output/semantic-checklist.md
  document_test:
    report_artifact: document-test-report.json
    state: document_tested
    repair_profile: full_document_test_plus_rebuild_preferred
    required_top_level_fields:
      - workflow_key
      - run_id
      - tested_at
      - test_outcome
      - defect_counts
      - recommended_next_action
      - recommended_actor
      - sections
    test_outcome_enum:
      - no_blocking_defect_found
      - blocking_defect_found
      - inconclusive
      - not_applicable
    required_sections:
      - structural
      - logic_consistency
      - downstream_readiness
      - semantic_drift
      - fixability
    fixability_classes:
      - mechanical_fixable
      - local_semantic_fixable
      - rebuild_required
      - human_judgement_required
    recommended_actor_enum:
      - executor_local_patch
      - workflow_rebuild
      - supervisor_handoff
      - external_gate_review
      - human_owner_decision
    escalation_rules:
      - main_structure_boundary_state_model_or_acceptance_change_requires_rebuild
      - cross_document_consistency_or_handoff_contract_change_defaults_to_rebuild
      - product_goal_priority_strategy_or_org_dependency_conflict_requires_human_judgement
      - authority_or_revision_conflict_requires_human_judgement
      - only_low_risk_field_ref_manifest_evidence_repairs_remain_mechanical
    downstream_consumption_contract:
      target_skills:
        - skill.qa.test_exec_cli
        - skill.qa.test_exec_web_e2e
      checks:
        - functional_coverage_contract_explicit
        - acceptance_to_strategy_mapping_explicit
        - test_units_sufficient_as_minimal_execution_prerequisites
        - environment_dependency_and_qualification_boundaries_consumable
        - no_test_goal_or_strategy_boundary_left_for_execution_redefinition

evidence:
  execution_schema: evidence/execution-evidence.schema.json
  supervision_schema: evidence/supervision-evidence.schema.json
  report_template: evidence/report.template.md

lifecycle:
  definition_file: ll.lifecycle.yaml
  max_revision_rounds: 3
  state_semantics:
    document_tested:
      evidence_complete: true
      implies_ready: false
      implies_approved: false
      implies_frozen: false
    supervisor_reviewed:
      evidence_submission_review_complete: true
      implies_authoritative_approval: false
    gate_ready:
      external_gate_submission_ready: true
      implies_approved: false
      implies_frozen: false

gate:
  freeze_requires:
    - input_structural_pass
    - input_semantic_pass
    - output_structural_pass
    - output_semantic_pass
    - document_test_report_present
    - execution_evidence_present
    - supervision_evidence_present
    - gate_subjects_present
  reject_when:
    - upstream_package_not_freeze_ready
    - selected_feat_ref_missing
    - missing_test_set_object
    - missing_gate_subjects
    - candidate_status_model_inconsistent
    - missing_test_execution_handoff
    - embedded_execution_inventory_in_testset
    - required_evidence_missing
  notes:
    - "`TESTSET` is strategy-level SSOT, not a runnable execution inventory."
    - "`functional_areas`, `logic_dimensions`, `state_model`, and `coverage_matrix` define the functional coverage contract that feeds `test_units`, acceptance traceability, and downstream execution planning."
    - "`test_units` define the minimal strategy anchors that map acceptance to execution, while `coverage_goal`, `branch_families`, `expansion_hints`, and `qualification_expectation` describe how downstream execution may expand runnable cases if qualification coverage is needed."
    - "Any runnable case expansion beyond the minimum strategy mapping belongs to downstream test execution runtime, not to this skill."
