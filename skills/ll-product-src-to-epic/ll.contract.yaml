skill_id: ll-product-src-to-epic
skill_type: workflow
version: 0.3.0
workflow_key: product.src-to-epic

authority:
  canonical_template: E:\ai\LEE\spec-global\departments\product\workflows\templates\src-to-epic\v1\workflow.yaml
  upstream_skill: ll-product-raw-to-src
  downstream_workflow: product.epic-to-feat

roles:
  executor:
    required: true
    evidence_required: true
    prompt_file: agents/executor.md
  supervisor:
    required: true
    evidence_required: true
    prompt_file: agents/supervisor.md

runtime:
  mode: lite_native
  command: python scripts/src_to_epic.py run --input <src-package-dir> --repo-root <repo-root>
  entry_script: scripts/src_to_epic.py
  accepted_input_paths:
    - artifacts/raw-to-src/<run_id>
    - direct src_candidate_package directory path
  produced_output_dir: artifacts/src-to-epic/<run_id>
  required_output_artifacts:
    - epic-freeze.md
    - epic-freeze.json
    - epic-review-report.json
    - document-test-report.json
    - epic-acceptance-report.json
    - epic-defect-list.json
    - handoff-to-epic-to-feat.json
    - execution-evidence.json
    - supervision-evidence.json

input:
  artifact_type: src_candidate_package
  contract_file: input/contract.yaml
  schema_file: input/schema.json
  structural_validation_required: true
  semantic_validation_required: true

output:
  artifact_type: epic_freeze_package
  contract_file: output/contract.yaml
  schema_file: output/schema.json
  template_file: output/template.md
  structural_validation_required: true
  semantic_validation_required: true

validation:
  structural:
    - "python scripts/src_to_epic.py validate-input --input $INPUT"
    - "python scripts/src_to_epic.py run --input $INPUT --repo-root $REPO_ROOT --allow-update"
    - "python scripts/src_to_epic.py validate-output --artifacts-dir $OUTPUT"
    - "python scripts/src_to_epic.py validate-package-readiness --artifacts-dir $OUTPUT"
    - "python scripts/src_to_epic.py freeze-guard --artifacts-dir $OUTPUT"
  semantic:
    input_checklist: input/semantic-checklist.md
    output_checklist: output/semantic-checklist.md
  document_test:
    report_artifact: document-test-report.json
    state: document_tested
    repair_profile: full_document_test_plus_rebuild_preferred
    required_top_level_fields:
      - workflow_key
      - run_id
      - tested_at
      - test_outcome
      - defect_counts
      - recommended_next_action
      - recommended_actor
      - sections
    test_outcome_enum:
      - no_blocking_defect_found
      - blocking_defect_found
      - inconclusive
      - not_applicable
    required_sections:
      - structural
      - logic_consistency
      - downstream_readiness
      - semantic_drift
      - fixability
    fixability_classes:
      - mechanical_fixable
      - local_semantic_fixable
      - rebuild_required
      - human_judgement_required
    recommended_actor_enum:
      - executor_local_patch
      - workflow_rebuild
      - supervisor_handoff
      - external_gate_review
      - human_owner_decision
    escalation_rules:
      - main_structure_boundary_state_model_or_acceptance_change_requires_rebuild
      - cross_document_consistency_or_handoff_contract_change_defaults_to_rebuild
      - product_goal_priority_strategy_or_org_dependency_conflict_requires_human_judgement
      - authority_or_revision_conflict_requires_human_judgement
      - only_low_risk_field_ref_manifest_evidence_repairs_remain_mechanical
    downstream_consumption_contract:
      target_workflow: product.epic-to-feat
      checks:
        - capability_slicing_derivable
        - scope_and_non_scope_decomposable_to_feat
        - acceptance_semantics_explicit
        - upstream_facts_and_inherited_constraints_explicit

evidence:
  execution_schema: evidence/execution-evidence.schema.json
  supervision_schema: evidence/supervision-evidence.schema.json
  report_template: evidence/report.template.md

lifecycle:
  definition_file: ll.lifecycle.yaml
  max_revision_rounds: 3
  state_semantics:
    document_tested:
      evidence_complete: true
      implies_ready: false
      implies_approved: false
      implies_frozen: false
    supervisor_reviewed:
      evidence_submission_review_complete: true
      implies_authoritative_approval: false
    gate_ready:
      external_gate_submission_ready: true
      implies_approved: false
      implies_frozen: false

gate:
  freeze_requires:
    - input_structural_pass
    - input_semantic_pass
    - output_structural_pass
    - output_semantic_pass
    - document_test_report_present
    - execution_evidence_present
    - supervision_evidence_present
  reject_when:
    - upstream_package_not_freeze_ready
    - missing_raw_to_src_provenance
    - epic_scope_collapses_to_single_feat
    - adr025_acceptance_incomplete
    - missing_epic_freeze_ref
    - required_evidence_missing

review_phase1:
  artifact_family: src_or_feat
  risk_profiles:
    - default
  coverage_dimensions:
    - ssot_alignment
    - object_completeness
    - contract_completeness
    - state_transition_closure
    - failure_path
    - testability
  required_checks:
    - ssot_alignment
    - object_completeness
    - contract_completeness
    - state_transition_closure
    - failure_path
    - testability
  gate_block_conditions:
    - missing_coverage
    - required_check_not_checked
    - blocker_count_gt_zero
