semantic_gate:
  required: true
notes:
  - "The response envelope is the formal skill output."
  - "`verdict` is an implementation-readiness verdict, not an external legal gate decision."
  - "`pass_with_revisions` and `block` must keep coder dispatch closed until downstream review is complete."
  - "Phase 2 deep-review outputs, when emitted, must include semantic review, system views, logic risk inventory, UX risk inventory, UX improvement inventory, journey simulation, state invariant checks, cross-artifact trace, open questions, dimension reviews, and review coverage surfaces."
  - "`review_coverage.status` must be one of `sufficient`, `partial`, or `insufficient`."
phase2_extended_data_fields:
