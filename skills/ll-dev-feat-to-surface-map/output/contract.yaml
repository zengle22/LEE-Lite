artifact_type: surface_map_package
schema_version: 1.0.0
authoritative_upstream_skill: ll-dev-feat-to-surface-map
accepted_statuses:
  - accepted
  - frozen
required_runtime_artifacts:
  - package-manifest.json
  - surface-map-bundle.md
  - surface-map-bundle.json
  - surface-map-review-report.json
  - surface-map-defect-list.json
  - surface-map-freeze-gate.json
  - execution-evidence.json
  - supervision-evidence.json
required_fields:
  - artifact_type
  - workflow_key
  - workflow_run_id
  - status
  - schema_version
  - feat_ref
  - surface_map_ref
  - selected_feat
  - design_impact_required
  - surface_map
  - source_refs
  - downstream_handoff
required_selected_feat_fields:
  - feat_ref
  - title
  - goal
  - scope
  - constraints
  - acceptance_checks
  - source_refs
required_surface_map_fields:
  - design_surfaces
  - ownership_summary
  - create_justification_summary
  - owner_binding_status
required_selector_fields:
  - feat_ref
  - surface_map_ref
structural_checks:
  - required_artifact_presence
  - upstream_workflow_is_product.epic-to-feat
  - selected_feat_ref_present
  - evidence_presence
  - surface_map_freeze_gate_is_pass
  - design_surface_consistency_present
semantic_gate:
  required: true
notes:
  - `surface_map_package` is the authority boundary between FEAT and shared design assets.
  - `design_impact_required=false` packages may carry empty design surfaces only when a bypass rationale is recorded.
