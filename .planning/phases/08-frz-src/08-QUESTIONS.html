function render(d) {
  const container = document.getElementById('sectionsContainer');
  container.innerHTML = '';
  let qNum = 0;
  d.sections.forEach(section => {
    const secDiv = document.createElement('div');
    secDiv.className = 'section';

    const headerDiv = document.createElement('div');
    headerDiv.className = 'section-header';

    const h2 = document.createElement('h2');
    const answeredInSection = section.questions.filter(q => q.answer && q.answer !== '').length;
    h2.innerHTML = `<span class="arrow">&#9660;</span> ${section.title} <span class="section-count">(${answeredInSection}/${section.questions.length} answered)</span>`;
    h2.onclick = () => {
      h2.classList.toggle('collapsed');
      bodyDiv.classList.toggle('collapsed');
    };
    headerDiv.appendChild(h2);

    const bodyDiv = document.createElement('div');
    bodyDiv.className = 'section-body';

    const grid = document.createElement('div');
    grid.className = 'q-grid';

    section.questions.forEach(q => {
      qNum++;
      const card = document.createElement('div');
      card.className = 'q-card' + (q.answer && q.answer !== '' ? ' answered' : '');
      card.id = 'card-' + q.id;

      let html = `<div class="q-badge">${q.id}</div><div class="q-title">${q.title}</div>`;
      html += `<div class="q-context">${q.context}</div>`;

      q.options.forEach(opt => {
        const checked = (q.answer === opt.id) ? ' checked' : '';
        html += `<div class="option"><input type="radio" name="${q.id}" value="${opt.id}" id="${q.id}-${opt.id}"${checked}><label for="${q.id}-${opt.id}"><strong>${opt.label}</strong><span>${opt.description}</span></label></div>`;
      });

      const chatMore = q.chat_more || '';
      const hasContent = chatMore.length > 0 ? ' has-content' : '';
      html += `<textarea class="${hasContent}" id="chat-${q.id}" placeholder="Add context, nuance, or clarification for this question...">${chatMore}</textarea>`;

      card.innerHTML = html;
      grid.appendChild(card);
    });

    bodyDiv.appendChild(grid);
    secDiv.appendChild(headerDiv);
    secDiv.appendChild(bodyDiv);
    container.appendChild(secDiv);
  });

  attachListeners(d);
  updateStats(d);
}

function attachListeners(d) {
  d.sections.forEach(section => {
    section.questions.forEach(q => {
      const radios = document.querySelectorAll(`input[name="${q.id}"]`);
      radios.forEach(radio => {
        radio.addEventListener('change', () => {
          q.answer = radio.value;
          q.status = 'answered';
          const card = document.getElementById('card-' + q.id);
          if (card) card.classList.add('answered');
          updateStats(d);
        });
      });
      const textarea = document.getElementById('chat-' + q.id);
      if (textarea) {
        textarea.addEventListener('input', () => {
          q.chat_more = textarea.value;
          textarea.classList.toggle('has-content', textarea.value.length > 0);
          updateStats(d);
        });
      }
    });
  });
}

function updateStats(d) {
  let total = 0, answered = 0, chatMore = 0;
  d.sections.forEach(s => s.questions.forEach(q => {
    total++;
    if (q.answer && q.answer !== '') answered++;
    if (q.chat_more && q.chat_more.trim() !== '') chatMore++;
  }));
  const remaining = total - answered;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('answeredCount').textContent = answered;
  document.getElementById('remainingCount').textContent = remaining;
  document.getElementById('progressFill').style.width = ((answered / total) * 100) + '%';

  // Update section counts
  const headers = document.querySelectorAll('.section h2');
  let idx = 0;
  d.sections.forEach(s => {
    const answ = s.questions.filter(q => q.answer && q.answer !== '').length;
    if (headers[idx]) {
      const countSpan = headers[idx].querySelector('.section-count');
      if (countSpan) countSpan.textContent = `(${answ}/${s.questions.length} answered)`;
    }
    idx++;
  });
}

function saveAnswers() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '08-QUESTIONS.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  // Also try File System Access API
  if (window.showSaveFilePicker) {
    // Already downloaded as fallback
  }
  alert('JSON file downloaded. Replace the original 08-QUESTIONS.json with this file, then return to Claude and say "refresh" or "finalize".');
}
